<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Ticket — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <style>
        /* ── Fast-form overrides ── */
        .ticket-wrap {
            max-width: 540px;
            margin: 0 auto;
        }

        .ticket-header {
            margin-bottom: 28px;
        }
        .ticket-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            color: var(--text-primary);
            font-weight: 400;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }
        .ticket-header p {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 300;
        }

        /* ── Field groups ── */
        .field-group {
            margin-bottom: 22px;
        }
        .field-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
            display: block;
        }
        .field-label .req {
            color: var(--red);
            margin-left: 2px;
        }

        /* ── Chip selector (facility + category) ── */
        .chip-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .chip.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 12px rgba(59,130,246,0.3);
        }

        /* ── Priority chips ── */
        .chip-priority.selected[data-value="low"] {
            background: var(--green); border-color: var(--green); color: white;
            box-shadow: 0 2px 12px rgba(16,185,129,0.3);
        }
        .chip-priority.selected[data-value="medium"] {
            background: var(--amber); border-color: var(--amber); color: white;
            box-shadow: 0 2px 12px rgba(245,158,11,0.3);
        }
        .chip-priority.selected[data-value="high"] {
            background: var(--red); border-color: var(--red); color: white;
            box-shadow: 0 2px 12px rgba(239,68,68,0.3);
        }

        /* ── Text input ── */
        .ticket-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.15s;
        }
        .ticket-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .ticket-input::placeholder {
            color: var(--text-tertiary);
        }

        .ticket-input-single {
            min-height: unset;
            resize: none;
        }

        /* ── Submit button ── */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.18s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .submit-btn:hover {
            box-shadow: 0 4px 20px rgba(59,130,246,0.4);
            transform: translateY(-1px);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Success state ── */
        .success-card {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success-card.show {
            display: block;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--green-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 28px;
        }
        .success-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: var(--text-primary);
            font-weight: 400;
            margin-bottom: 6px;
        }
        .success-card p {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 24px;
        }
        .success-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .success-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 2px 12px rgba(59,130,246,0.3);
        }
        .btn-secondary {
            background: var(--card);
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ── Error toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: #f1f5f9;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 90vw;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ── Submitting spinner ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Compact on mobile ── */
        @media (max-width: 640px) {
            .content { padding: 24px 18px; }
            .chip { padding: 10px 14px; font-size: 13px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
</head>
<body>

<div class="layout">
    <div id="rail-mount"></div>

    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <a href="/index.html" class="topbar-name">NorthPoint</a>
                <div class="topbar-sep"></div>
                <span class="topbar-section">Quick Ticket</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="currentDate"></span>
                <span class="topbar-role" id="topbarRole"></span>
            </div>
        </header>

        <div class="content">
            <div class="ticket-wrap">

                <!-- ── FORM ── -->
                <div id="ticket-form">
                    <div class="ticket-header animate-1">
                        <h1>Quick Ticket</h1>
                        <p>Tap, type, submit. Get back to work.</p>
                    </div>

                    <!-- Facility -->
                    <div class="field-group animate-2">
                        <label class="field-label">Facility <span class="req">*</span></label>
                        <div class="chip-grid" id="facility-chips"></div>
                    </div>

                    <!-- Category -->
                    <div class="field-group animate-3">
                        <label class="field-label">Category <span class="req">*</span></label>
                        <div class="chip-grid" id="category-chips">
                            <button class="chip" data-value="network">Network</button>
                            <button class="chip" data-value="hardware">Hardware</button>
                            <button class="chip" data-value="software">Software</button>
                            <button class="chip" data-value="printer">Printer</button>
                            <button class="chip" data-value="phone">Phone</button>
                            <button class="chip" data-value="access">Access / Account</button>
                            <button class="chip" data-value="security">Security</button>
                            <button class="chip" data-value="other">Other</button>
                        </div>
                    </div>

                    <!-- Priority -->
                    <div class="field-group animate-4">
                        <label class="field-label">Priority</label>
                        <div class="chip-grid" id="priority-chips">
                            <button class="chip chip-priority" data-value="low">Low</button>
                            <button class="chip chip-priority selected" data-value="medium">Medium</button>
                            <button class="chip chip-priority" data-value="high">High</button>
                        </div>
                    </div>

                    <!-- Subject -->
                    <div class="field-group animate-4">
                        <label class="field-label">Subject <span class="req">*</span></label>
                        <input type="text" class="ticket-input ticket-input-single" id="ticket-subject"
                               placeholder="Brief summary, e.g. 'Wi-Fi down in radiology'" maxlength="200" autocomplete="off">
                    </div>

                    <!-- Description -->
                    <div class="field-group animate-5">
                        <label class="field-label">Details <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;">(optional)</span></label>
                        <textarea class="ticket-input" id="ticket-desc"
                                  placeholder="Any extra details — room number, error message, who's affected..."
                                  rows="3"></textarea>
                    </div>

                    <!-- Submit -->
                    <div class="animate-5">
                        <button class="submit-btn" id="submit-btn" onclick="submitTicket()">Submit Ticket</button>
                    </div>
                </div>

                <!-- ── SUCCESS ── -->
                <div class="success-card" id="success-card">
                    <div class="success-icon">&#10003;</div>
                    <h2>Ticket Submitted</h2>
                    <p id="success-summary"></p>
                    <div class="success-actions">
                        <button class="success-btn btn-primary" onclick="resetForm()">Submit Another</button>
                        <a href="/index.html" class="success-btn btn-secondary">Back to Hub</a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/nav.js"></script>
<script>
/* ── Facilities list ── */
const FACILITIES = [
    'Agua Fria','Arrowhead',
    'Deer Valley','Desert Valley',
    'Lake Pleasant','Maryvale',
    'North Mountain','Paradise Valley',
    'Peoria','Sun City',
    'Surprise','Thunderbird'
];

/* ── State ── */
let selectedFacility = null;
let selectedCategory = null;
let selectedPriority = 'medium';

/* ── Render facility chips ── */
(function renderFacilityChips() {
    const grid = document.getElementById('facility-chips');
    FACILITIES.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.value = name;
        btn.textContent = name;
        grid.appendChild(btn);
    });
})();

/* ── Chip selection logic ── */
function setupChipGroup(containerId, onSelect, allowDeselect) {
    const container = document.getElementById(containerId);
    container.addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        const siblings = container.querySelectorAll('.chip');
        const wasSelected = chip.classList.contains('selected');
        siblings.forEach(c => c.classList.remove('selected'));
        if (!wasSelected || !allowDeselect) {
            chip.classList.add('selected');
            onSelect(chip.dataset.value);
        } else {
            onSelect(null);
        }
    });
}

setupChipGroup('facility-chips', v => { selectedFacility = v; });
setupChipGroup('category-chips', v => { selectedCategory = v; });
setupChipGroup('priority-chips', v => { selectedPriority = v || 'medium'; });

/* ── Submit ── */
async function submitTicket() {
    const subject = document.getElementById('ticket-subject').value.trim();
    const desc    = document.getElementById('ticket-desc').value.trim();

    if (!selectedFacility) return showToast('Select a facility');
    if (!selectedCategory) return showToast('Select a category');
    if (!subject)          return showToast('Enter a subject');

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Submitting...';

    try {
        const { error } = await _npSupabase.from('tickets').insert({
            facility:    selectedFacility,
            category:    selectedCategory,
            priority:    selectedPriority,
            subject:     subject,
            description: desc || null,
            status:      'open',
            submitted_by: _npUser?.id || null,
            submitted_email: _npUser?.email || null,
        });

        if (error) throw error;

        document.getElementById('ticket-form').style.display = 'none';
        const card = document.getElementById('success-card');
        card.classList.add('show');
        document.getElementById('success-summary').textContent =
            `${selectedCategory} ticket at ${selectedFacility} — ${selectedPriority} priority`;
    } catch (err) {
        console.error('Ticket submit error:', err);
        showToast('Failed to submit — ' + (err.message || 'try again'));
        btn.disabled = false;
        btn.textContent = 'Submit Ticket';
    }
}

/* ── Reset ── */
function resetForm() {
    selectedFacility = null;
    selectedCategory = null;
    selectedPriority = 'medium';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    // Re-select medium priority
    document.querySelector('#priority-chips .chip[data-value="medium"]').classList.add('selected');
    document.getElementById('ticket-subject').value = '';
    document.getElementById('ticket-desc').value = '';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Submit Ticket';
    document.getElementById('success-card').classList.remove('show');
    document.getElementById('ticket-form').style.display = '';
}

/* ── Toast ── */
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── Auth init ── */
npInit(null).then(session => {
    if (!session) return;
    npPopulateTopbar();
    renderNav('tickets');
});
</script>
</body>
</html>
