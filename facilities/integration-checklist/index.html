<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Integration Checklist — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

        .content { background: #f4f6f8; font-family: 'Manrope', 'DM Sans', sans-serif; }
        .page-wrap { max-width: 860px; margin: 0 auto; padding: 36px 28px 80px; }

        .pg-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8b5cf6; margin-bottom: 8px; }
        .pg-title { font-size: 26px; font-weight: 800; color: #0a1628; margin-bottom: 6px; }
        .pg-desc { font-size: 13px; color: #5d6779; margin-bottom: 28px; }

        /* Facility header bar */
        .fac-bar {
            background: #fff;
            border: 1px solid #dce1e9;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .fac-bar-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #8a95a8; margin-bottom: 4px; }
        .fac-bar-input {
            flex: 1;
            border: none;
            font-size: 15px;
            font-weight: 700;
            color: #0a1628;
            background: transparent;
            font-family: inherit;
            outline: none;
            min-width: 0;
        }
        .fac-bar-input::placeholder { color: #bec6d3; font-weight: 500; }
        .fac-bar-divider { width: 1px; height: 36px; background: #e8ecf1; }
        .fac-bar-meta { font-size: 12px; color: #8a95a8; white-space: nowrap; }
        .fac-bar-meta strong { color: #0a1628; }
        .fac-bar-progress-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
        .fac-bar-pct { font-size: 11px; font-weight: 700; color: #0a1628; text-align: right; }
        .fac-bar-track { height: 6px; background: #e8ecf1; border-radius: 99px; overflow: hidden; }
        .fac-bar-fill { height: 100%; border-radius: 99px; background: #8b5cf6; transition: width 0.3s ease; }

        /* Phase card */
        .phase-card {
            background: #fff;
            border: 1px solid #dce1e9;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .phase-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.15s;
        }
        .phase-header:hover { background: #fafbfc; }
        .phase-card.open .phase-header { border-bottom-color: #e8ecf1; }
        .phase-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #f0ecff;
            color: #7c3aed;
            font-size: 12px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .phase-card.complete .phase-num { background: #f0fdf4; color: #15803d; }
        .phase-title { font-size: 14px; font-weight: 700; color: #0a1628; flex: 1; }
        .phase-timing { font-size: 11px; color: #8a95a8; }
        .phase-prog { font-size: 12px; font-weight: 700; color: #8a95a8; margin-left: auto; }
        .phase-card.complete .phase-prog { color: #15803d; }
        .phase-chevron { font-size: 11px; color: #bec6d3; transition: transform 0.2s; }
        .phase-card.open .phase-chevron { transform: rotate(90deg); }

        .phase-body { display: none; padding: 8px 0; }
        .phase-card.open .phase-body { display: block; }

        /* Check items */
        .check-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 11px 20px;
            border-bottom: 1px solid #f4f6f8;
            cursor: pointer;
            transition: background 0.12s;
        }
        .check-row:last-child { border-bottom: none; }
        .check-row:hover { background: #fafbfc; }
        .check-box {
            width: 18px; height: 18px;
            border: 2px solid #dce1e9;
            border-radius: 5px;
            flex-shrink: 0;
            margin-top: 1px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            font-size: 10px; color: transparent;
        }
        .check-row.done .check-box {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: #fff;
        }
        .check-text { font-size: 13px; color: #3e4554; flex: 1; line-height: 1.5; }
        .check-row.done .check-text { color: #9da8b8; text-decoration: line-through; }
        .check-note { font-size: 11px; color: #8a95a8; display: block; margin-top: 2px; text-decoration: none; }
        .check-row.done .check-note { color: #bec6d3; }
        .check-tag {
            font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px;
            background: #f0ecff; color: #7c3aed; flex-shrink: 0; margin-top: 2px;
        }
        .check-tag.tag-infra   { background: #eff6ff; color: #2563eb; }
        .check-tag.tag-device  { background: #fef3c7; color: #d97706; }
        .check-tag.tag-sw      { background: #f0fdf4; color: #15803d; }
        .check-tag.tag-clinical { background: #fdf4ff; color: #9333ea; }
        .check-tag.tag-people  { background: #fff7ed; color: #c2410c; }

        /* Bottom bar */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 56px; right: 0;
            background: rgba(255,255,255,0.95);
            border-top: 1px solid #dce1e9;
            backdrop-filter: blur(8px);
            padding: 12px 32px;
            display: flex; align-items: center; gap: 16px;
            z-index: 100;
        }
        .bb-label { font-size: 12px; color: #8a95a8; }
        .bb-pct { font-size: 14px; font-weight: 800; color: #0a1628; }
        .bb-track { flex: 1; height: 6px; background: #e8ecf1; border-radius: 99px; overflow: hidden; }
        .bb-fill { height: 100%; border-radius: 99px; background: #8b5cf6; transition: width 0.3s ease; }
        .bb-counts { font-size: 12px; color: #8a95a8; }
        .btn-reset {
            font-size: 12px; font-weight: 600; color: #8a95a8;
            border: 1px solid #dce1e9; background: #fff;
            padding: 6px 14px; border-radius: 7px; cursor: pointer; font-family: inherit;
        }
        .btn-reset:hover { border-color: #bec6d3; color: #5d6779; }

        /* Dark mode */
        html[data-theme="dark"] .content { background: #080f1a; }
        html[data-theme="dark"] .pg-title { color: #e2e8f0; }
        html[data-theme="dark"] .pg-desc  { color: #8a95a8; }
        html[data-theme="dark"] .fac-bar { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .fac-bar-input { color: #e2e8f0; }
        html[data-theme="dark"] .fac-bar-divider { background: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .fac-bar-meta { color: #64748b; }
        html[data-theme="dark"] .fac-bar-meta strong { color: #e2e8f0; }
        html[data-theme="dark"] .fac-bar-track { background: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .fac-bar-pct { color: #e2e8f0; }
        html[data-theme="dark"] .phase-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .phase-header:hover { background: rgba(255,255,255,0.03); }
        html[data-theme="dark"] .phase-card.open .phase-header { border-bottom-color: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .phase-title { color: #e2e8f0; }
        html[data-theme="dark"] .phase-num { background: rgba(139,92,246,0.18); color: #a78bfa; }
        html[data-theme="dark"] .phase-card.complete .phase-num { background: rgba(16,185,129,0.15); color: #34d399; }
        html[data-theme="dark"] .phase-card.complete .phase-prog { color: #34d399; }
        html[data-theme="dark"] .check-row { border-bottom-color: rgba(255,255,255,0.05); }
        html[data-theme="dark"] .check-row:hover { background: rgba(255,255,255,0.03); }
        html[data-theme="dark"] .check-box { border-color: rgba(255,255,255,0.15); }
        html[data-theme="dark"] .check-text { color: #cbd5e1; }
        html[data-theme="dark"] .check-row.done .check-text { color: #475569; }
        html[data-theme="dark"] .check-note { color: #64748b; }
        html[data-theme="dark"] .bottom-bar { background: rgba(8,15,26,0.95); border-top-color: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .bb-label { color: #64748b; }
        html[data-theme="dark"] .bb-pct { color: #e2e8f0; }
        html[data-theme="dark"] .bb-track { background: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .bb-counts { color: #64748b; }
        html[data-theme="dark"] .btn-reset { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10); color: #64748b; }
        html[data-theme="dark"] .btn-reset:hover { border-color: rgba(255,255,255,0.20); color: #94a3b8; }
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: 180ms ease-in vt-out; }
        ::view-transition-new(root) { animation: 260ms ease-out vt-in; }
        @keyframes vt-out { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-6px); } }
        @keyframes vt-in  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="mod-facilities">
<div class="layout">
    <div id="rail-mount"></div>
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <a href="/index.html" class="topbar-name">NorthPoint</a>
                <div class="topbar-sep"></div>
                <a href="/facilities/index.html" class="topbar-section" style="text-decoration:none;color:inherit;">Facilities</a>
                <div class="topbar-sep"></div>
                <span class="topbar-section">IT Integration Checklist</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="currentDate"></span>
                <span class="topbar-role" id="topbarRole"></span>
            </div>
        </header>

        <div class="content">
        <div class="page-wrap">

            <div class="pg-eyebrow">Facilities · Onboarding</div>
            <h1 class="pg-title">IT Integration Checklist</h1>
            <p class="pg-desc">Step-by-step IT readiness checklist for onboarding a new facility. Progress saves locally in your browser.</p>

            <!-- Facility bar -->
            <div class="fac-bar">
                <div style="flex:1;">
                    <div class="fac-bar-label">Facility</div>
                    <input class="fac-bar-input" id="fac-name-input" type="text" placeholder="Enter facility name…" />
                </div>
                <div class="fac-bar-divider"></div>
                <div class="fac-bar-meta">
                    <div>Started <strong id="start-date">—</strong></div>
                </div>
                <div class="fac-bar-divider"></div>
                <div class="fac-bar-progress-wrap">
                    <div class="fac-bar-pct" id="overall-pct">0%</div>
                    <div class="fac-bar-track"><div class="fac-bar-fill" id="overall-fill" style="width:0%"></div></div>
                </div>
            </div>

            <div id="phases-container"></div>

        </div>
        </div>
    </div>
</div>

<!-- Bottom progress bar -->
<div class="bottom-bar">
    <span class="bb-label">Overall progress</span>
    <span class="bb-pct" id="bb-pct">0%</span>
    <div class="bb-track"><div class="bb-fill" id="bb-fill" style="width:0%"></div></div>
    <span class="bb-counts" id="bb-counts">0 of 0 complete</span>
    <button class="btn-reset" onclick="resetChecklist()">Reset</button>
</div>

<script src="/nav.js"></script>
<script>
// ── Checklist data ──────────────────────────────────────────────────────────
const PHASES = [
    {
        title: 'Assessment & Planning',
        timing: 'Weeks 1–2',
        items: [
            { id: 'a1', text: 'Site visit and physical walkthrough completed', note: 'Document IDF/MDF locations, rack space, power', tag: 'infra' },
            { id: 'a2', text: 'Network topology documented', note: 'Existing cabling runs, port counts, fiber vs copper', tag: 'infra' },
            { id: 'a3', text: 'Internet service provider confirmed', note: 'Vendor, bandwidth tier, static IP provisioned', tag: 'infra' },
            { id: 'a4', text: 'IT hardware budget approved', note: 'Use the Onboarding Estimator for cost projection', tag: null },
            { id: 'a5', text: 'Staff headcount and role breakdown obtained', note: 'From facility administrator — needed for license count', tag: 'people' },
            { id: 'a6', text: 'Go-live target date confirmed with facility leadership', note: null, tag: null },
            { id: 'a7', text: 'NinjaOne site profile created', note: null, tag: 'sw' },
        ]
    },
    {
        title: 'Procurement & Staging',
        timing: 'Weeks 2–4',
        items: [
            { id: 'p1', text: 'Workstations / shared endpoints ordered', note: 'Qty based on device-to-staff ratio — SNF shared model', tag: 'device' },
            { id: 'p2', text: 'Network switches staged and configured', note: 'VLANs: Staff / Clinical / Guest / IoT', tag: 'infra' },
            { id: 'p3', text: 'Wireless access points received', note: null, tag: 'infra' },
            { id: 'p4', text: 'Security cameras ordered', note: '~1 per 4 beds + common areas', tag: 'infra' },
            { id: 'p5', text: 'VOIP hardware ordered', note: 'Fireside UCx — confirm extension plan with facility admin', tag: 'device' },
            { id: 'p6', text: 'MDM enrollment profiles created in Jamf / MaaS360', note: null, tag: 'sw' },
            { id: 'p7', text: 'Google Workspace accounts provisioned (or M365 if applicable)', note: 'One account per staff member', tag: 'sw' },
        ]
    },
    {
        title: 'Infrastructure Installation',
        timing: 'Weeks 3–6',
        items: [
            { id: 'i1', text: 'Core network switch installed in IDF/MDF', note: null, tag: 'infra' },
            { id: 'i2', text: 'Edge firewall configured', note: 'Meraki MX or Ubiquiti — apply NACS security baseline', tag: 'infra' },
            { id: 'i3', text: 'Wireless APs mounted, configured, tested', note: 'Coverage validated in all resident and clinical areas', tag: 'infra' },
            { id: 'i4', text: 'VLAN segmentation complete and tested', note: 'Staff · Clinical · Guest · Camera/IoT isolation', tag: 'infra' },
            { id: 'i5', text: 'Internet circuit active and throughput tested', note: null, tag: 'infra' },
            { id: 'i6', text: 'Security cameras mounted, connected, tested', note: 'Visible in Ubiquiti Protect dashboard', tag: 'infra' },
            { id: 'i7', text: 'NinjaOne agent deployed on network infrastructure', note: null, tag: 'sw' },
        ]
    },
    {
        title: 'Device Configuration',
        timing: 'Weeks 4–6',
        items: [
            { id: 'd1', text: 'Workstations imaged and domain-joined (or cloud-joined)', note: null, tag: 'device' },
            { id: 'd2', text: 'MDM enrollment complete on all endpoints', note: 'Verify compliance status in Jamf / MaaS360', tag: 'device' },
            { id: 'd3', text: 'SentinelOne EDR deployed and reporting', note: null, tag: 'sw' },
            { id: 'd4', text: 'NinjaOne agent on all endpoints', note: null, tag: 'sw' },
            { id: 'd5', text: 'VOIP phones provisioned and tested', note: 'All extensions active in UCx — test inbound and outbound', tag: 'device' },
            { id: 'd6', text: 'Printers configured on network', note: 'Clinical print queues, labels for medication carts', tag: 'device' },
            { id: 'd7', text: 'Screen lock, MFA, and password policies enforced', note: 'Per NACS security baseline', tag: 'sw' },
        ]
    },
    {
        title: 'Clinical Systems',
        timing: 'Weeks 5–7',
        items: [
            { id: 'c1', text: 'PointClickCare tenant provisioned', note: 'Contact Rogi Poblete for PCC coordination', tag: 'clinical' },
            { id: 'c2', text: 'PCC user accounts created for all clinical staff', note: null, tag: 'clinical' },
            { id: 'c3', text: 'PCC clinical hardware configured (workstations, printers)', note: 'Point of care terminals, med cart tablets', tag: 'clinical' },
            { id: 'c4', text: 'PCC go-live date confirmed with DON and administrator', note: null, tag: 'clinical' },
            { id: 'c5', text: 'NetHealth Therapy configured (if applicable)', note: null, tag: 'clinical' },
            { id: 'c6', text: 'Clinical staff IT orientation scheduled', note: 'Coordinate with Sheila Pelletier for Relias assignment', tag: 'people' },
        ]
    },
    {
        title: 'Software & Identity',
        timing: 'Weeks 4–7',
        items: [
            { id: 's1', text: 'All staff accounts active and tested', note: 'Email, login, MFA enrolled', tag: 'sw' },
            { id: 's2', text: 'Relias training modules assigned', note: 'Mandatory compliance courses assigned to all new staff', tag: 'sw' },
            { id: 's3', text: 'ADP / UKG facility configuration complete', note: null, tag: 'sw' },
            { id: 's4', text: 'DocuSign / eSign accounts provisioned', note: null, tag: 'sw' },
            { id: 's5', text: 'Shared drives and file permissions configured', note: 'Google Drive folders or ShareFile structure', tag: 'sw' },
            { id: 's6', text: 'FreeScout helpdesk mailbox created for facility', note: null, tag: 'sw' },
        ]
    },
    {
        title: 'Go-Live & Handoff',
        timing: 'Week 7–8',
        items: [
            { id: 'g1', text: 'End-to-end systems test completed', note: 'Internet, VOIP, PCC, printers, cameras — all green', tag: null },
            { id: 'g2', text: 'Facility added to NorthPoint Supabase facilities table', note: 'Set status to Operational, is_incoming to false', tag: 'sw' },
            { id: 'g3', text: 'Facility appears correctly on NorthPoint map', note: null, tag: 'sw' },
            { id: 'g4', text: 'IT documentation filed in NorthPoint Field Guide', note: 'Network diagram, admin contacts, device inventory', tag: null },
            { id: 'g5', text: 'Facility admin and DON briefed on IT support process', note: 'How to submit a ticket via FreeScout', tag: 'people' },
            { id: 'g6', text: 'Post-go-live check scheduled (1 week out)', note: null, tag: null },
        ]
    },
];

// ── Storage key ─────────────────────────────────────────────────────────────
const STORE_KEY = 'np-integration-checklist';

function loadState() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch { return {}; }
}
function saveState(state) {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
    const state = loadState();
    const container = document.getElementById('phases-container');
    container.innerHTML = '';

    let totalItems = 0;
    let doneItems  = 0;

    PHASES.forEach((phase, pi) => {
        const phaseDone = phase.items.filter(it => state[it.id]).length;
        const phaseTotal = phase.items.length;
        const allDone = phaseDone === phaseTotal;
        totalItems += phaseTotal;
        doneItems  += phaseDone;

        const tagMap = { infra: 'tag-infra', device: 'tag-device', sw: 'tag-sw', clinical: 'tag-clinical', people: 'tag-people' };

        const card = document.createElement('div');
        card.className = `phase-card${allDone ? ' complete' : ''}`;
        card.innerHTML = `
            <div class="phase-header" onclick="togglePhase(this.parentElement)">
                <div class="phase-num">${allDone ? '✓' : pi + 1}</div>
                <div class="phase-title">${phase.title}</div>
                <div class="phase-timing">${phase.timing}</div>
                <div class="phase-prog">${phaseDone}/${phaseTotal}</div>
                <div class="phase-chevron">▶</div>
            </div>
            <div class="phase-body">
                ${phase.items.map(it => {
                    const done = !!state[it.id];
                    const tagCls = it.tag ? tagMap[it.tag] || '' : '';
                    const tagLabel = it.tag ? { infra: 'Infra', device: 'Device', sw: 'Software', clinical: 'Clinical', people: 'People' }[it.tag] : '';
                    return `<div class="check-row${done ? ' done' : ''}" onclick="toggleItem('${it.id}', this)">
                        <div class="check-box">${done ? '✓' : ''}</div>
                        <div class="check-text">${it.text}${it.note ? `<span class="check-note">${it.note}</span>` : ''}</div>
                        ${it.tag ? `<span class="check-tag ${tagCls}">${tagLabel}</span>` : ''}
                    </div>`;
                }).join('')}
            </div>`;

        // Open incomplete phases automatically on first load
        if (!allDone && phaseDone > 0) card.classList.add('open');
        if (pi === 0 && phaseDone === 0) card.classList.add('open');

        container.appendChild(card);
    });

    updateProgress(doneItems, totalItems);

    // Restore facility name + start date
    if (state._facName) document.getElementById('fac-name-input').value = state._facName;
    if (state._startDate) document.getElementById('start-date').textContent = state._startDate;
}

function togglePhase(card) {
    card.classList.toggle('open');
}

function toggleItem(id, row) {
    const state = loadState();
    state[id] = !state[id];
    if (!state._startDate) {
        state._startDate = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    saveState(state);
    render();
    // Re-open the parent phase after re-render
    const cards = document.querySelectorAll('.phase-card');
    cards.forEach(card => {
        const rows = card.querySelectorAll('.check-row');
        rows.forEach(r => {
            if (r.querySelector('.check-text')?.textContent?.trim().startsWith(
                document.querySelector(`.check-row[onclick*="${id}"] .check-text`)?.textContent?.trim()?.slice(0, 20) || '~~~'
            )) card.classList.add('open');
        });
    });
}

function updateProgress(done, total) {
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('overall-pct').textContent = pct + '%';
    document.getElementById('overall-fill').style.width = pct + '%';
    document.getElementById('bb-pct').textContent = pct + '%';
    document.getElementById('bb-fill').style.width = pct + '%';
    document.getElementById('bb-counts').textContent = `${done} of ${total} complete`;
}

function resetChecklist() {
    if (!confirm('Reset all progress for this checklist?')) return;
    localStorage.removeItem(STORE_KEY);
    document.getElementById('fac-name-input').value = '';
    render();
}

// Persist facility name
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('fac-name-input');
    if (input) input.addEventListener('input', () => {
        const state = loadState();
        state._facName = input.value;
        saveState(state);
    });
});

// ── Init ─────────────────────────────────────────────────────────────────────
npInit(null).then(session => {
    if (!session) return;
    npPopulateTopbar();
    renderNav('facilities');
    render();
});
</script>
</body>
</html>
