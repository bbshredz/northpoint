<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Map — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ── Layout overrides for full-height map ── */
        html { height: 100%; }
        body { height: 100%; overflow: hidden; }
        .layout { height: 100%; }
        .main { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; min-height: 0; padding: 0; position: relative; overflow: hidden; }

        /* ── Map container ── */
        #map {
            width: 100%;
            height: 100%;
            background: #0a0f1e;
        }

        /* ── Pulse marker base ── */
        .np-marker {
            position: relative;
            width: 14px;
            height: 14px;
        }
        .np-marker .dot {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: 2;
        }
        .np-marker .ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            z-index: 1;
            animation: np-pulse 2.4s ease-out infinite;
            opacity: 0;
        }

        /* Status: online — green */
        .s-online .dot  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
        .s-online .ring { border: 2px solid #22c55e; }

        /* Status: warning — amber */
        .s-warning .dot  { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
        .s-warning .ring { border: 2px solid #f59e0b; }

        /* Status: offline — red */
        .s-offline .dot  { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
        .s-offline .ring { border: 2px solid #ef4444; animation-duration: 1.6s; }

        /* Status: incoming — dimmed dashed outline */
        .s-incoming .dot  { background: transparent; border: 2px dashed #64748b; }
        .s-incoming .ring { display: none; }

        /* Status: service — blue */
        .s-service .dot  { background: #3b82f6; box-shadow: 0 0 6px #3b82f688; }
        .s-service .ring { border: 2px solid #3b82f6; }

        @keyframes np-pulse {
            0%   { transform: scale(0.6); opacity: 0.8; }
            70%  { transform: scale(2.4); opacity: 0; }
            100% { transform: scale(2.4); opacity: 0; }
        }

        /* Stagger rings so nearby facilities don't pulse in sync */
        .np-marker:nth-child(odd) .ring { animation-delay: 1.2s; }

        /* ── Loading overlay ── */
        #map-loading {
            position: absolute;
            inset: 0;
            background: #0a0f1e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 12px;
            transition: opacity 0.4s;
        }
        #map-loading.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #1e293b;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-label { font-size: 12px; color: #475569; letter-spacing: 0.08em; }

        /* ── Legend ── */
        #map-legend {
            position: absolute;
            bottom: 28px;
            left: 12px;
            z-index: 500;
            background: rgba(10, 15, 30, 0.88);
            backdrop-filter: blur(8px);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
            white-space: nowrap;
        }
        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-dot.s-online  { background: #22c55e; }
        .legend-dot.s-warning { background: #f59e0b; }
        .legend-dot.s-offline { background: #ef4444; }
        .legend-dot.s-service { background: #3b82f6; }
        .legend-dot.s-incoming { background: transparent; border: 1.5px dashed #64748b; }

        /* ── Detail panel — top slide ── */
        #facility-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            height: 190px;
            background: rgba(10, 15, 30, 0.94);
            backdrop-filter: blur(12px);
            border: 1px solid #1e293b;
            border-radius: 12px;
            z-index: 500;
            transform: translateY(calc(-100% - 32px));
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            pointer-events: none;
        }
        #facility-panel.open { transform: translateY(0); pointer-events: auto; }
        #facility-panel.panel-refresh .panel-photo-col,
        #facility-panel.panel-refresh .panel-detail-col,
        #facility-panel.panel-refresh .panel-stats-col { opacity: 0.15; transition: opacity 0.1s; }

        .panel-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            border: none;
            background: #1e293b;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            z-index: 2;
        }
        .panel-close:hover { background: #334155; color: #e2e8f0; }

        /* ── Photo column ── */
        .panel-photo-col {
            width: 210px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }
        .panel-photo-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
            display: none;
        }
        .panel-photo-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .panel-photo-placeholder svg { width: 36px; height: 36px; opacity: 0.25; }
        .panel-photo-num {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #475569;
            text-transform: uppercase;
        }

        /* ── Detail column ── */
        .panel-detail-col {
            flex: 1;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
            border-left: 1px solid #1e293b;
            min-width: 0;
        }
        .panel-region {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #64748b;
        }
        .panel-name {
            font-family: 'DM Serif Display', serif;
            font-size: 17px;
            color: #f1f5f9;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .panel-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 20px;
            align-self: flex-start;
        }
        .psb-online  { background: #052e16; color: #4ade80; }
        .psb-warning { background: #1c1200; color: #fbbf24; }
        .psb-offline { background: #1f0404; color: #f87171; }
        .psb-incoming { background: #0f172a; color: #64748b; border: 1px solid #334155; }
        .psb-service  { background: #0c1a3d; color: #60a5fa; }
        .panel-detail-rows {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 4px;
        }
        .panel-row {
            display: flex;
            gap: 8px;
            align-items: baseline;
            min-width: 0;
        }
        .panel-row-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .panel-row-value {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .panel-row-value a { color: #60a5fa; text-decoration: none; }
        .panel-row-value a:hover { text-decoration: underline; }

        /* ── Stats column ── */
        .panel-stats-col {
            width: 175px;
            flex-shrink: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 1px solid #1e293b;
        }
        .panel-stats { display: flex; flex-direction: column; gap: 10px; }
        .panel-stat { display: flex; flex-direction: column; gap: 2px; }
        .panel-stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
        }
        .panel-stat-value { font-size: 13px; color: #cbd5e1; font-weight: 500; }
        .panel-actions { display: flex; flex-direction: column; gap: 6px; }
        .panel-btn {
            width: 100%;
            padding: 7px 0;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            border: 1px solid transparent;
            transition: background 0.15s;
        }
        .panel-btn-primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
        .panel-btn-primary:hover { background: #2563eb; }
        .panel-btn-secondary { background: transparent; color: #94a3b8; border-color: #334155; }
        .panel-btn-secondary:hover { background: #1e293b; color: #e2e8f0; }

        /* ── Leaflet overrides ── */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: none !important;
        }
        .leaflet-control-zoom a {
            background: rgba(10, 15, 30, 0.88) !important;
            border: 1px solid #1e293b !important;
            color: #94a3b8 !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-control-zoom a:hover {
            background: #1e293b !important;
            color: #e2e8f0 !important;
        }
        .leaflet-control-attribution {
            background: rgba(10, 15, 30, 0.7) !important;
            color: #334155 !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: #475569 !important; }

        /* ── Light mode ── */
        html:not([data-theme="dark"]) #map { background: #e8edf2; }
        html:not([data-theme="dark"]) #map-loading { background: #eef2f7; }
        html:not([data-theme="dark"]) .loading-spinner { border-color: #dde3ea; border-top-color: #3b82f6; }
        html:not([data-theme="dark"]) .loading-label { color: #64748b; }
        html:not([data-theme="dark"]) #map-legend {
            background: rgba(255,255,255,0.92);
            border-color: #dde3ea;
        }
        html:not([data-theme="dark"]) .legend-item { color: #475569; }
        html:not([data-theme="dark"]) #facility-panel {
            background: rgba(255,255,255,0.96);
            border-color: #dde3ea;
        }
        html:not([data-theme="dark"]) .panel-close { background: #f1f5f9; color: #64748b; }
        html:not([data-theme="dark"]) .panel-close:hover { background: #e2e8f0; color: #1e293b; }
        html:not([data-theme="dark"]) .panel-photo-col { background: #f1f5f9; }
        html:not([data-theme="dark"]) .panel-photo-placeholder { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
        html:not([data-theme="dark"]) .panel-detail-col { border-left-color: #e2e8f0; }
        html:not([data-theme="dark"]) .panel-region { color: #94a3b8; }
        html:not([data-theme="dark"]) .panel-name { color: #0f172a; }
        html:not([data-theme="dark"]) .panel-row-label { color: #94a3b8; }
        html:not([data-theme="dark"]) .panel-row-value { color: #374151; }
        html:not([data-theme="dark"]) .panel-stats-col { border-left-color: #e2e8f0; }
        html:not([data-theme="dark"]) .panel-stat-label { color: #94a3b8; }
        html:not([data-theme="dark"]) .panel-stat-value { color: #1e293b; }
        html:not([data-theme="dark"]) .panel-btn-secondary { color: #64748b; border-color: #e2e8f0; }
        html:not([data-theme="dark"]) .panel-btn-secondary:hover { background: #f1f5f9; color: #374151; }
        html:not([data-theme="dark"]) .psb-incoming { background: #f1f5f9; border-color: #e2e8f0; }
        html:not([data-theme="dark"]) .leaflet-control-zoom a {
            background: rgba(255,255,255,0.92) !important;
            border-color: #e2e8f0 !important;
            color: #64748b !important;
        }
        html:not([data-theme="dark"]) .leaflet-control-zoom a:hover {
            background: #f1f5f9 !important;
            color: #1e293b !important;
        }
        html:not([data-theme="dark"]) .leaflet-control-attribution {
            background: rgba(255,255,255,0.8) !important;
            color: #94a3b8 !important;
        }
        html:not([data-theme="dark"]) .leaflet-control-attribution a { color: #64748b !important; }
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: 180ms ease-in vt-out; }
        ::view-transition-new(root) { animation: 260ms ease-out vt-in; }
        @keyframes vt-out { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-6px); } }
        @keyframes vt-in  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>

<script>
// ── Auth + init ──────────────────────────────────────────────────────────────
npInit(null).then(session => {
    if (!session) return;
    npPopulateTopbar();
    renderNav('facilities');
    loadMap();
});

// ── Map ──────────────────────────────────────────────────────────────────────
let _map = null;
let _tileLayer = null;
let _openFacilityId = null;

function getTileUrl() {
    return document.documentElement.getAttribute('data-theme') === 'dark'
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
}

// Swap tile layer when theme toggles
new MutationObserver(() => {
    if (_tileLayer) _tileLayer.setUrl(getTileUrl());
}).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

async function loadMap() {
    // Init Leaflet
    _map = L.map('map', {
        center: [36.8, -119.4],
        zoom: 7,
        zoomControl: false,
        scrollWheelZoom: true,
        wheelPxPerZoomLevel: 120,   // default 60 — higher = less zoom per scroll tick
        zoomSnap: 0.25,             // quarter-step zoom levels for smooth feel
        zoomDelta: 0.5,             // zoom by 0.5 levels per scroll, not 1
    });

    // Zoom control — top left so panel doesn't overlap
    L.control.zoom({ position: 'topleft' }).addTo(_map);

    // Re-center once after layout fully settles (prevents init drift)
    setTimeout(() => _map.setView([36.8, -119.4], 7, { animate: false }), 400);

    // CARTO tiles — theme-aware
    _tileLayer = L.tileLayer(getTileUrl(), {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19,
    }).addTo(_map);

    // Load facilities from Supabase
    const { data, error } = await _npSupabase
        .from('facilities')
        .select('*')
        .order('name');

    const loading = document.getElementById('map-loading');
    loading.classList.add('hidden');
    setTimeout(() => { loading.style.display = 'none'; }, 400);

    if (error || !data) {
        console.error('Facilities load error:', error);
        return;
    }

    data.forEach(f => addMarker(f));
}

function statusClass(f) {
    if (f.is_service_center) return 's-service';
    if (f.is_incoming) return 's-incoming';
    const s = (f.status || 'online').toLowerCase();
    if (s === 'warning' || s === 'warn') return 's-warning';
    if (s === 'offline' || s === 'down') return 's-offline';
    return 's-online';
}

function addMarker(f) {
    const sc = statusClass(f);
    const icon = L.divIcon({
        className: '',
        html: `<div class="np-marker ${sc}"><div class="ring"></div><div class="dot"></div></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
    });

    const marker = L.marker([f.lat, f.lng], { icon }).addTo(_map);
    marker.on('click', () => openPanel(f));
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function populatePanel(f) {
    document.getElementById('panel-region').textContent = (f.region || '').toUpperCase();
    document.getElementById('panel-name').textContent = f.name;

    const badge = document.getElementById('panel-status');
    const badgeText = f.is_service_center ? 'Service Center'
        : f.is_incoming ? 'Incoming'
        : (f.status === 'warning' ? 'Needs Attention'
        : f.status === 'offline' ? 'Offline'
        : 'Operational');
    const badgeClass = f.is_service_center ? 'psb-service'
        : f.is_incoming ? 'psb-incoming'
        : (f.status === 'warning' ? 'psb-warning'
        : f.status === 'offline' ? 'psb-offline'
        : 'psb-online');
    badge.className = `panel-status-badge ${badgeClass}`;
    badge.textContent = badgeText;

    const addr = `${f.address}, ${f.city}, ${f.state} ${f.zip}`;
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
    document.getElementById('panel-address').textContent = `${f.address}, ${f.city}, ${f.state}`;
    document.getElementById('panel-phone').textContent = f.phone || '—';
    document.getElementById('panel-admin').textContent = f.admin_name || '—';
    document.getElementById('panel-emp').textContent = f.emp_count || '—';

    // Photo — files named {padded_number}.jpg|png|jpeg
    const photoImg = document.getElementById('panel-photo');
    const photoPlaceholder = document.getElementById('panel-photo-placeholder');
    document.getElementById('panel-photo-num').textContent = `Facility ${String(f.facility_number).padStart(2, '0')}`;
    photoImg.style.display = 'none';
    photoPlaceholder.style.display = 'flex';
    const photoNum  = String(f.facility_number).padStart(2, '0');
    const photoExts = ['jpg', 'png', 'jpeg'];
    let   photoExt  = 0;
    photoImg.onload = () => { photoImg.style.display = 'block'; photoPlaceholder.style.display = 'none'; };
    photoImg.onerror = () => {
      photoExt++;
      if (photoExt < photoExts.length) {
        photoImg.src = `/facilities/photos/${photoNum}.${photoExts[photoExt]}`;
      } else {
        photoImg.style.display = 'none';
        photoPlaceholder.style.display = 'flex';
      }
    };
    photoImg.src = `/facilities/photos/${photoNum}.${photoExts[0]}`;

    document.getElementById('panel-maps-btn').href = mapsUrl;
    const ticketsBtn = document.getElementById('panel-tickets-btn');
    if (f.tickets_url) {
        ticketsBtn.href = f.tickets_url;
        ticketsBtn.style.display = '';
    } else {
        ticketsBtn.removeAttribute('href');
        ticketsBtn.style.display = 'none';
    }
}

function openPanel(f) {
    const panel = document.getElementById('facility-panel');

    // Same facility — toggle closed
    if (_openFacilityId === f.id) {
        closePanel();
        return;
    }

    if (panel.classList.contains('open')) {
        // Different facility while open — flash content, no pan
        panel.classList.add('panel-refresh');
        setTimeout(() => {
            populatePanel(f);
            panel.classList.remove('panel-refresh');
        }, 150);
    } else {
        // First open — slide panel down, pan map up slightly
        populatePanel(f);
        panel.classList.add('open');
        setTimeout(() => _map.panBy([0, -55], { animate: true, duration: 0.32 }), 60);
    }

    _openFacilityId = f.id;
}

function closePanel() {
    document.getElementById('facility-panel').classList.remove('open');
    _map.panBy([0, 55], { animate: true, duration: 0.32 });
    _openFacilityId = null;
}

document.getElementById('panel-close').addEventListener('click', closePanel);
</script>
</body>
</html>
