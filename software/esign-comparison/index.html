<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSign Comparison — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ── Layout ── */
        :root {
            --bg: #080f1a;
            --surface-card: #1e293b;
            --surface-deep: #0f172a;
            --border: #334155;
            --border-subtle: #1a2535;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-dim: #475569;
            --cat-bg: #0a1220;
            --tooltip-bg: #1a2540;
            --rec-inner-border: #162032;
        }
        .main { background: var(--bg); }
        .content { padding: 0; overflow-y: auto; }
        .es-wrap {
            padding: 28px 32px 60px;
            max-width: 1040px;
            margin: 0 auto;
            font-size: 16px;
        }

        /* ── Page header ── */
        .es-page-header { margin-bottom: 28px; }
        .es-page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .es-page-sub { font-size: 15px; color: #64748b; }

        /* ── Section divider ── */
        .es-section {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .es-section-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
            white-space: nowrap;
        }
        .es-section-line { flex: 1; height: 1px; background: #1e293b; }

        /* ── Recommendation banner ── */
        .rec-banner {
            background: #0c1a2e;
            border: 1px solid #0d9488;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
        }
        .rec-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0d9488 0%, #3b82f6 100%);
        }
        .rec-eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #0d9488;
            margin-bottom: 8px;
        }
        .rec-title {
            font-family: 'DM Serif Display', serif;
            font-size: 30px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .rec-sub { font-size: 15px; color: #94a3b8; margin-bottom: 20px; }
        .rec-points {
            list-style: none;
            padding: 0; margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 24px;
        }
        .rec-points li {
            font-size: 15px;
            color: #cbd5e1;
            padding-left: 18px;
            position: relative;
            line-height: 1.5;
        }
        .rec-points li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #0d9488;
            font-weight: 700;
        }
        .rec-caveat {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #162032;
            font-size: 13px;
            color: #64748b;
        }
        .rec-caveat a { color: #0d9488; text-decoration: none; }

        /* ── Wizard card ── */
        .wizard-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 32px 36px;
            margin-bottom: 36px;
        }
        .wizard-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .wizard-desc { font-size: 15px; color: #94a3b8; line-height: 1.6; margin-bottom: 0; }
        .wizard-header { margin-bottom: 24px; }
        .wizard-step-label { font-size: 12px; color: #475569; margin-bottom: 6px; }

        /* Step dots */
        .step-dots { display: flex; gap: 6px; margin-bottom: 24px; }
        .step-dot {
            height: 5px; width: 5px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.25s;
        }
        .step-dot.active { width: 18px; border-radius: 3px; background: #0d9488; }
        .step-dot.done { background: #0d9488; opacity: 0.35; }

        /* Slide animation */
        @keyframes esSlide {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .step-body { animation: esSlide 0.22s ease; }

        /* Form elements */
        .es-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .es-input, .es-select, .es-textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 14px;
            color: #f1f5f9;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.18s;
        }
        .es-input:focus, .es-select:focus, .es-textarea:focus { border-color: #0d9488; }
        .es-select { cursor: pointer; }
        .es-textarea { resize: vertical; min-height: 76px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        .form-group { margin-bottom: 14px; }
        .form-group:last-child { margin-bottom: 0; }

        /* Checkbox grid */
        .check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 4px;
        }
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 11px 13px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            user-select: none;
        }
        .check-item:hover { border-color: #475569; }
        .check-item.checked { border-color: #0d9488; background: rgba(13,148,136,0.05); }
        .check-box {
            width: 15px; height: 15px;
            border: 1.5px solid #334155;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: transparent;
        }
        .check-item.checked .check-box {
            background: #0d9488;
            border-color: #0d9488;
            color: white;
        }
        .check-text { font-size: 15px; color: #cbd5e1; line-height: 1.4; }

        /* Vote options */
        .vote-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .vote-option {
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 10px;
            padding: 15px 14px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.18s, background 0.18s;
        }
        .vote-option:hover { border-color: #475569; }
        .vote-option.selected { border-color: #0d9488; background: rgba(13,148,136,0.06); }
        .vote-icon { font-size: 20px; margin-bottom: 8px; }
        .vote-label {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .vote-option.selected .vote-label { color: #0d9488; }
        .vote-desc { font-size: 14px; color: #64748b; line-height: 1.4; }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
        }
        .btn-primary {
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
            font-family: inherit;
        }
        .btn-primary:hover { background: #0f766e; }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-ghost {
            background: transparent;
            color: #64748b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.18s, color 0.18s;
        }
        .btn-ghost:hover { border-color: #475569; color: #94a3b8; }

        /* Error */
        .es-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #ef4444;
            margin-top: 10px;
        }

        /* Success */
        .wizard-success {
            text-align: center;
            padding: 36px 20px;
            animation: esSlide 0.3s ease;
        }
        .success-ring {
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 2px solid #0d9488;
            background: rgba(13,148,136,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 22px;
            color: #0d9488;
        }
        .success-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        .success-desc { font-size: 14px; color: #94a3b8; line-height: 1.6; }
        .success-desc strong { color: #0d9488; }

        /* ── Calculator ── */
        .calc-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 36px;
        }
        .calc-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .calc-desc { font-size: 15px; color: #94a3b8; margin-bottom: 26px; }

        /* Sliders */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }
        .slider-lbl {
            font-size: 14px;
            color: #94a3b8;
            white-space: nowrap;
            min-width: 130px;
        }
        .es-range {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            cursor: pointer;
            height: 4px;
        }
        .es-range::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
            background: #334155;
        }
        .es-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 17px; height: 17px;
            border-radius: 50%;
            background: #0d9488;
            margin-top: -6.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .es-range.danger::-webkit-slider-thumb { background: #ef4444; }
        .es-range::-moz-range-track {
            height: 4px;
            border-radius: 2px;
            background: #334155;
        }
        .es-range::-moz-range-thumb {
            width: 17px; height: 17px;
            border-radius: 50%;
            background: #0d9488;
            border: none;
            cursor: pointer;
        }
        .es-range.danger::-moz-range-thumb { background: #ef4444; }
        .slider-val {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            min-width: 72px;
            text-align: right;
        }
        .slider-val.danger { color: #ef4444; }
        .slider-hint {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
            padding-left: 144px;
        }

        /* Cost cards */
        .cost-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .cost-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 18px 20px;
        }
        .cost-eyebrow {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 2px;
        }
        .cost-vendor { font-size: 15px; font-weight: 600; color: #94a3b8; margin-bottom: 10px; }
        .cost-amount {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .cost-amount.danger { color: #ef4444; }
        .cost-amount.safe { color: #0d9488; }
        .cost-detail { font-size: 14px; color: #64748b; line-height: 1.6; }
        .cost-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }
        .cost-badge.bad { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
        .cost-badge.good { background: rgba(13,148,136,0.08); border: 1px solid rgba(13,148,136,0.2); color: #0d9488; }

        /* Bar chart */
        .bar-chart-wrap {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            padding: 0 4px;
        }
        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .bar-rect {
            width: 44px;
            border-radius: 4px 4px 0 0;
            transition: height 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
            align-self: flex-end;
        }
        .bar-col-lbl { font-size: 12px; color: #64748b; text-align: center; }
        .bar-compare-text {
            flex: 1;
            border-left: 1px dashed #334155;
            padding-left: 18px;
            font-size: 13px;
            color: #475569;
            line-height: 1.7;
            align-self: center;
        }

        /* ── Matrix ── */
        .matrix-wrap {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .matrix-head { padding: 24px 28px 16px; }
        .matrix-head-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .matrix-head-desc { font-size: 15px; color: #94a3b8; }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
        }
        .matrix-table th {
            padding: 10px 16px;
            background: #0f172a;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            text-align: left;
        }
        .matrix-table th:nth-child(2),
        .matrix-table th:nth-child(3),
        .matrix-table th:nth-child(4) { text-align: center; width: 90px; }
        .matrix-table td {
            padding: 12px 16px;
            border-top: 1px solid #1a2535;
            font-size: 14px;
            color: #cbd5e1;
            vertical-align: top;
        }
        .matrix-table td:nth-child(2),
        .matrix-table td:nth-child(3),
        .matrix-table td:nth-child(4) { text-align: center; vertical-align: middle; }
        /* Tool logo in matrix/market headers */
        .tool-logo {
            width: 22px; height: 22px;
            border-radius: 5px;
            object-fit: contain;
            display: block;
            margin: 0 auto 4px;
        }
        .matrix-table tbody tr:hover td { background: rgba(255,255,255,0.015); }
        .m-feat { font-weight: 500; color: #e2e8f0; }
        .m-note { font-size: 12px; color: #475569; margin-top: 2px; }
        .m-status { font-size: 14px; font-weight: 700; }
        .m-status.full { color: #0d9488; }
        .m-status.partial { color: #f59e0b; }
        .m-status.none { color: #ef4444; }
        .m-status.warn { color: #f59e0b; }
        .matrix-legend {
            padding: 12px 20px;
            border-top: 1px solid #1a2535;
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #475569;
        }
        .matrix-legend span { display: flex; align-items: center; gap: 5px; }

        /* ── Accordion ── */
        .accordion-wrap {
            background: #1a2540;
            border: 1px solid #2a3f5f;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
            position: relative;
        }
        .accordion-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0d9488 0%, #3b82f680 100%);
        }
        .accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 28px;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.18s;
        }
        .accordion-btn:hover { background: rgba(13,148,136,0.04); }
        .accordion-eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #0d9488;
            margin-bottom: 5px;
        }
        .accordion-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
        }
        .accordion-chevron {
            color: #0d9488;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .accordion-chevron.open { transform: rotate(180deg); }
        .accordion-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.38s ease;
        }
        .accordion-body.open { max-height: 900px; }
        .accordion-inner {
            padding: 0 28px 28px;
            border-top: 1px solid #243450;
        }
        .strat-block { margin-top: 20px; }
        .strat-title {
            font-size: 15px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .strat-text { font-size: 15px; color: #94a3b8; line-height: 1.7; }
        .strat-callout {
            background: #0f1e30;
            border-left: 3px solid #0d9488;
            border-radius: 0 8px 8px 0;
            padding: 14px 18px;
            margin: 16px 0;
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            font-style: italic;
        }

        /* ── Guest notice ── */
        .guest-notice {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #64748b;
        }
        .guest-notice strong { color: #94a3b8; }

        /* ── Discovery lead-in ── */
        .discovery-leadin {
            background: #131e2e;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.7;
        }
        .discovery-leadin strong { color: #f1f5f9; }

        /* 3-col cost row */
        .cost-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        /* ── Market comparison ── */
        .mktcmp-wrap {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .mktcmp-head { padding: 24px 28px 16px; }
        .mktcmp-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .mktcmp-desc { font-size: 15px; color: #94a3b8; margin-bottom: 16px; }

        /* Pill toggles */
        .tool-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
        .tool-pill {
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1.5px solid #334155;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .tool-pill:hover { border-color: #475569; color: #94a3b8; }
        .tool-pill.on-current  { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.07); }
        .tool-pill.on-proposed { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.07); }
        .tool-pill.on-alt      { border-color: #a855f7; color: #a855f7; background: rgba(168,85,247,0.07); }
        .tool-pill.on-ent      { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.07); }

        /* Table scroll wrapper */
        .mktcmp-scroll { overflow-x: auto; }
        .mktcmp-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 560px;
        }

        /* Tool header cells */
        .mktcmp-table th {
            padding: 0;
            background: #0f172a;
            border-left: 1px solid #1a2535;
            vertical-align: top;
        }
        .mktcmp-table th:first-child { border-left: none; }
        .th-feature {
            padding: 12px 16px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #475569;
            text-align: left;
            min-width: 180px;
        }
        .th-tool {
            padding: 14px 14px 12px;
            text-align: center;
            min-width: 120px;
        }

/* ── Helpers ─────────────────────────────────────────────── */

function CheckboxGrid({ options, selected, onChange }) {
    const toggle = id => onChange(
        selected.includes(id) ? selected.filter(x => x !== id) : [...selected, id]
    );
    return (
        <div className="check-grid">
            {options.map(opt => (
                <div
                    key={opt.id}
                    className={`check-item${selected.includes(opt.id) ? ' checked' : ''}`}
                    onClick={() => toggle(opt.id)}
                >
                    <div className="check-box">✓</div>
                    <span className="check-text">{opt.label}</span>
                </div>
            ))}
        </div>
    );
}

function StepDots({ current, total }) {
    return (
        <div className="step-dots">
            {Array.from({ length: total }).map((_, i) => (
                <div
                    key={i}
                    className={`step-dot${i + 1 === current ? ' active' : i + 1 < current ? ' done' : ''}`}
                />
            ))}
        </div>
    );
}

/* ── Tooltip ─────────────────────────────────────────────── */

function Tooltip({ content, children, width = 260 }) {
    const [pos, setPos] = useState(null);
    if (!content) return <>{children}</>;
    const show = e => {
        const r = e.currentTarget.getBoundingClientRect();
        setPos({ top: r.top - 8, left: r.left + r.width / 2 });
    };
    return (
        <span style={{position:'relative', display:'inline'}} onMouseEnter={show} onMouseLeave={() => setPos(null)}>
            {children}
            {pos && (
                <span style={{
                    position:'fixed', top: pos.top, left: pos.left,
                    transform:'translate(-50%, -100%)',
                    zIndex:9999,
                    background:'var(--tooltip-bg)', border:'1px solid var(--border)', borderRadius:'8px',
                    padding:'10px 13px', width:`${width}px`, maxWidth:'90vw',
                    fontSize:'12px', color:'var(--text-secondary)', lineHeight:'1.55',
                    pointerEvents:'none', boxShadow:'0 8px 32px rgba(0,0,0,0.45)',
                    whiteSpace:'normal', textAlign:'left', fontWeight:'normal', fontStyle:'normal',
                }}>
                    {content}
                    <span style={{
                        position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)',
                        borderLeft:'5px solid transparent', borderRight:'5px solid transparent',
                        borderTop:'5px solid var(--border)', display:'block', width:0, height:0,
                    }} />
                </span>
            )}
        </span>
    );
}

                        className="es-input"

                        onChange={e => setName(e.target.value)}

function Step2({ data, onChange, onBack, onNext }) {
    const [selected, setSelected] = useState(data.use_cases || []);

    return (

function Step3({ data, onChange, onBack, onNext }) {
    const [selected,  setSelected]  = useState(data.pain_points_arr  || []);
    const [otherText, setOtherText] = useState(data.pain_points_other || '');
    const proceed = () => {
        const parts = selected.filter(x => x !== 'other');
        if (selected.includes('other') && otherText.trim()) parts.push(otherText.trim());
        onChange({ pain_points: parts.join('; '), pain_points_arr: selected, pain_points_other: otherText });
        onNext();
    };
    return (
        <div className="step-body">
            <div className="wizard-header">
                <div className="wizard-step-label">Step 3 of 4</div>
                <div className="wizard-title">What's your biggest headache today?</div>

                <button className="btn-ghost" onClick={onBack}>← Back</button>
                <button className="btn-primary" onClick={proceed}>Continue →</button>
            </div>
        </div>
    );
}

function Step4({ data, onBack, onSubmit, submitting, error }) {
    const [ideal,    setIdeal]    = useState(data.ideal_outcome || '');
    const [vote,     setVote]     = useState(data.vote_choice   || '');
    const [comments, setComments] = useState(data.comments      || '');

                <label className="es-label" style={{marginBottom:'10px'}}>Your Recommendation *</label>
                <div className="vote-options">
                    {VOTE_OPTIONS.map(opt => (
                        <div

                            <div className="vote-label">{opt.label}</div>

            </div>
            <div className="form-group">

                <textarea
                    className="es-textarea"

                />
            </div>
            {error && <div className="es-error">{error}</div>}
            <div className="btn-row">
                <button className="btn-ghost" onClick={onBack}>← Back</button>
                <button
                    className="btn-primary"
                    disabled={!vote || submitting}
                    onClick={submit}
                >
                    {submitting ? 'Submitting...' : 'Submit Decision →'}
                </button>
            </div>
        </div>
    );
}

/* ── Discovery wizard ────────────────────────────────────── */

function DiscoveryWizard({ prefillName }) {
    const [step,       setStep]       = useState(1);
    const [form,       setForm]       = useState({});
    const [submitting, setSubmitting] = useState(false);
    const [submitted,  setSubmitted]  = useState(false);
    const [error,      setError]      = useState('');

    const update = patch => setForm(prev => ({ ...prev, ...patch }));

    const submit = async finalPatch => {
        const payload = { ...form, ...finalPatch };
        setSubmitting(true);
        setError('');
        try {
            const { error: err } = await _npSupabase
                .from('esign_stakeholder_input')
                .insert([{
                    name:          payload.name,
                    title:         payload.title         || null,
                    department:    payload.department    || null,
                    use_cases:     payload.use_cases?.length ? payload.use_cases : null,
                    pain_points:   payload.pain_points   || null,
                    ideal_outcome: payload.ideal_outcome || null,
                    vote_choice:   payload.vote_choice,
                    comments:      payload.comments      || null,
                }]);
            if (err) throw err;
            setForm(prev => ({ ...prev, ...finalPatch }));
            setSubmitted(true);
        } catch (e) {
            setError(e.message || 'Submission failed. Please try again.');
        } finally {
            setSubmitting(false);
        }
    };

    if (submitted) {
        const voted = VOTE_OPTIONS.find(o => o.id === form.vote_choice)?.label || form.vote_choice;
        return (
            <div className="wizard-card">
                <div className="wizard-success">
                    <div className="success-ring">✓</div>
                    <div className="success-title">Input received. Thank you, {form.name}.</div>
                    <div className="success-desc">
                        Your vote for <strong>{voted}</strong> has been recorded.<br />
                        Anthony will review all stakeholder input before the March 2026 renewal decision.
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="wizard-card">
            <StepDots current={step} total={4} />
            {step === 1 && <Step1 data={form} onChange={update} onNext={() => setStep(2)} prefillName={prefillName} />}
            {step === 2 && <Step2 data={form} onChange={update} onBack={() => setStep(1)} onNext={() => setStep(3)} />}
            {step === 3 && <Step3 data={form} onChange={update} onBack={() => setStep(2)} onNext={() => setStep(4)} />}
            {step === 4 && <Step4 data={form} onChange={update} onBack={() => setStep(3)} onSubmit={submit} submitting={submitting} error={error} />}
        </div>
    );
}

                    <span style={{color:'#f87171'}}>Adobe</span> <span style={{color:'var(--text-muted)', fontSize:'11px'}}>({abSeats} seats):</span> <span style={{color:'var(--text-primary)', fontWeight:600}}>{fmt(abAnnual)}/yr</span><br />
                    <span style={{color:'#c084fc'}}>PandaDoc</span> <span style={{color:'var(--text-muted)', fontSize:'11px'}}>({pdSeats} seats):</span> <span style={{color:'var(--text-primary)', fontWeight:600}}>{fmt(pdAnnual)}/yr</span><br />
                    <span style={{color:'#0d9488', fontSize:'11px', marginTop:'4px', display:'inline-block'}}>
                        Cheapest: {dsAnnual === cheapest ? 'DocuSign' : abAnnual === cheapest ? 'Adobe Sign' : 'PandaDoc'} at {fmt(cheapest)}/yr
                    </span>
                </div>
            </div>
        </div>
    );
}

/* ── Unified comparison matrix ───────────────────────────── */

const TAG_CLS  = { current: 'tag-current', proposed: 'tag-proposed', alt: 'tag-alt', ent: 'tag-ent' };
const PILL_ON  = { current: 'on-current', proposed: 'on-proposed', alt: 'on-alt', ent: 'on-ent' };
const TOOL_COL = { docusign: '#3b82f6', adobe: '#ef4444', pandadoc: '#a855f7', ironclad: '#f59e0b', contractsafe: '#64748b' };

function ToolLogo({ domain, alt }) {
    return (
        <img
            className="tool-logo"
            src={`https://img.logo.dev/${domain}?format=png&size=64`}
            alt={alt}
            onError={e => { e.target.style.display = 'none'; }}
        />
    );
}

function UnifiedMatrix() {
    const [active, setActive] = useState(MKT_TOOLS.map(t => t.id));
    const toggle = id => setActive(prev =>
        prev.includes(id) ? (prev.length > 1 ? prev.filter(x => x !== id) : prev) : [...prev, id]
    );
    const visible = MKT_TOOLS.filter(t => active.includes(t.id));
    const categories = [...new Set(UNIFIED_ROWS.map(r => r.cat))];

    return (
        <div className="mktcmp-wrap">
            <div className="mktcmp-head">
                <div className="es-section" style={{marginBottom:'4px'}}>
                    <span className="es-section-label">Feature Comparison</span>
                    <div className="es-section-line" />
                </div>
                <div className="mktcmp-title">All Options on the Table</div>
                <div className="mktcmp-desc">
                    Toggle tools to compare. Hover any feature, tool name, or cell for detail.
                </div>
                <div className="tool-pills">
                    {MKT_TOOLS.map(t => (
                        <button
                            key={t.id}
                            className={`tool-pill${active.includes(t.id) ? ' ' + PILL_ON[t.tagCls] : ''}`}
                            onClick={() => toggle(t.id)}
                        >
                            {t.name}
                        </button>
                    ))}
                </div>
            </div>
            <div className="mktcmp-scroll">
                <table className="mktcmp-table">
                    <thead>
                        <tr>
                            <th><div className="th-feature">Feature</div></th>
                            {visible.map(t => (
                                <th key={t.id} style={{borderTop:`2px solid ${TOOL_COL[t.id] || '#334155'}`}}>
                                    <Tooltip content={t.note} width={280}>
                                        <div className="th-tool" style={{cursor:'help'}}>
                                            <ToolLogo domain={t.domain} alt={t.name} />
                                            <div className="th-tool-name" style={{color: TOOL_COL[t.id]}}>{t.name}</div>
                                            <div><span className={`th-tool-tag ${TAG_CLS[t.tagCls]}`}>{t.tag}</span></div>
                                            <div className="th-tool-cost">{t.cost}<br />{t.model}</div>
                                        </div>
                                    </Tooltip>
                                </th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {categories.map(cat => (
                            <React.Fragment key={cat}>
                                <tr>
                                    <td colSpan={visible.length + 1} style={{
                                        background:'var(--cat-bg)', fontSize:'11px', fontWeight:700,
                                        color:'var(--text-dim)', letterSpacing:'0.09em', textTransform:'uppercase',
                                        padding:'7px 16px',
                                    }}>{cat}</td>
                                </tr>
                                {UNIFIED_ROWS.filter(r => r.cat === cat).map(row => (
                                    <tr key={row.feature}>
                                        <td>
                                            <Tooltip content={row.tooltip} width={290}>
                                                <span className="m-feat" style={{cursor:'help', borderBottom:'1px dashed var(--border)'}}>{row.feature}</span>
                                            </Tooltip>
                                        </td>
                                        {visible.map(t => {
                                            const key = TOOL_KEY[t.id];
                                            const val = row[key];
                                            const s = STATUS[val] || STATUS.none;
                                            return (
                                                <td key={t.id} style={{textAlign:'center', verticalAlign:'middle'}}>
                                                    <Tooltip content={row.cells?.[key]} width={260}>
                                                        <span className={`m-status ${s.cls}`} style={{cursor:'help'}}>{s.icon}</span>
                                                    </Tooltip>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </React.Fragment>
                        ))}
                    </tbody>
                </table>
            </div>
            <div className="mktcmp-legend">
                <span><span className="m-status full">✓</span> Full support</span>
                <span><span className="m-status partial">~</span> Partial / requires work</span>
                <span><span className="m-status none">✕</span> Not available</span>
                <span><span className="m-status warn">!</span> Risk / watch</span>
                <span style={{color:'var(--text-dim)', marginLeft:'auto'}}>Hover cells for detail</span>
            </div>
        </div>
    );
}

/* ── Strategic accordion ─────────────────────────────────── */

function StrategicAccordion() {
    const [open, setOpen] = useState(false);
    return (
        <div className="accordion-wrap">
            <button className="accordion-btn" onClick={() => setOpen(o => !o)}>
                <div>
                    <div className="accordion-eyebrow">My Perspective</div>
                    <div className="accordion-title">Strategic Consolidation</div>
                </div>
                <svg
                    className={`accordion-chevron${open ? ' open' : ''}`}
                    width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" strokeWidth="2"
                >
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div className={`accordion-body${open ? ' open' : ''}`}>
                <div className="accordion-inner">
                    <div className="strat-block">
                        <div className="strat-title">What documents are being signed?</div>
                        <div className="strat-text">
                            The $5.80 overage fee becomes a problem at volume. The question worth asking before renewal: <em>what are we actually sending?</em> If any portion of the monthly envelope count is going toward internal confirmations — staff acknowledging a policy update, confirming they read a training document — those don't require a legally-binding signature. They require a timestamp and a record. That distinction matters because it changes the volume math entirely.
                        </div>
                    </div>
                    <div className="strat-callout">
                        I don't know for certain whether NACS is using DocuSign for internal sign-offs — but it's worth auditing before renewal. If even 20% of envelopes are going toward internal acknowledgments, moving those to a simpler workflow would eliminate the overage exposure without switching platforms.
                    </div>
                    <div className="strat-block">
                        <div className="strat-title">The recommended approach</div>
                        <div className="strat-text">
                            Keep DocuSign for everything that needs a legally-binding signature: resident admissions, employment agreements, vendor contracts. These need a formal audit trail and connect directly to PointClickCare without any custom setup.<br /><br />
                            If internal confirmations are part of the current volume, the right move is a separate, simpler system — not a $5.80-per-envelope legal signature tool. This could be a dedicated training platform, a module built into NorthPoint, or a workflow already available in the HRIS. The goal is to stop paying legal-signature rates for administrative recordkeeping.
                        </div>
                    </div>
                    <div className="strat-block">
                        <div className="strat-title">Why not just switch to Adobe Sign?</div>
                        <div className="strat-text">
                            Adobe Sign solves the overage problem (seat-based pricing, no per-envelope fee) but introduces new ones: rebuilding the PointClickCare integration, retraining every facility, and migrating all existing templates. At current volumes, DocuSign is still cheaper. Adobe only wins on price if volume consistently exceeds ~2,000 envelopes/month — check the calculator below.<br /><br />
                            Adobe's real differentiator is PDF creation and editing. If NACS standardizes on Microsoft 365 and needs document-building workflows across facilities, that conversation is worth reopening at the 2027 renewal.
                        </div>
                    </div>
                    <div className="strat-block">
                        <div className="strat-title">Ask about contract flexibility</div>
                        <div className="strat-text">
                            The current DocuSign agreement may be a multi-year (3-year) term. If so, it's worth asking directly at renewal whether a 1-year option is available — even at a slightly higher annual rate. A shorter term gives NACS the flexibility to reassess if usage patterns shift, if Adobe's M365 integration matures, or if a better option emerges. Locking in for 3 years at the wrong volume tier is a risk worth naming before signing.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ── Recommendation banner ───────────────────────────────── */

function RecBanner() {
    const [open, setOpen] = useState(false);
    return (
        <div className="rec-banner" style={{padding:0}}>
            <button
                onClick={() => setOpen(o => !o)}
                style={{
                    width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center',
                    padding:'24px 32px', background:'transparent', border:'none', cursor:'pointer', textAlign:'left',
                }}
            >
                <div>
                    <div className="rec-eyebrow">IT Recommendation — March 2026 Renewal</div>
                    <div className="rec-title">Renew DocuSign. Eliminate the overage risk.</div>
                    <div className="rec-sub" style={{marginBottom:0}}>Based on contract terms, usage patterns, and EHR integration requirements</div>
                </div>
                <svg
                    style={{color:'#0d9488', flexShrink:0, marginLeft:'20px', transition:'transform 0.3s', transform: open ? 'rotate(180deg)' : 'rotate(0deg)'}}
                    width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                >
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div style={{
                overflow:'hidden', maxHeight: open ? '600px' : '0',
                transition:'max-height 0.38s ease',
            }}>
                <div style={{padding:'0 32px 28px', borderTop:'1px solid var(--rec-inner-border)'}}>
                    <ul className="rec-points" style={{marginTop:'20px'}}>
                        <li>PointClickCare integration is native to DocuSign — rebuilding it in Adobe Sign requires custom API work and re-validation</li>
                        <li>At current envelope volume (under 1,666/mo), DocuSign at $19,800/yr beats Adobe Sign at most realistic seat counts</li>
                        <li>Audit actual envelope usage before renewal — if any volume is going toward internal acknowledgments, those can move to a simpler workflow and drop the overage risk entirely</li>
                        <li>No migration cost, no retraining, no re-integration — the ROI math on switching doesn't close at current volume</li>
                    </ul>
                    <div className="rec-caveat">
                        Don't agree? <a href="#discovery">Fill out the discovery section below</a> — your use case might change this analysis.
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ── App root ────────────────────────────────────────────── */

function App({ prefillName, isGuest }) {
    const [lightMode, setLightMode] = useState(() =>
        localStorage.getItem('np-theme') !== 'dark'
    );
    // Sync body.light with site-wide np-theme. Watch for nav toggle changes via MutationObserver.
    useEffect(() => {
        document.body.classList.toggle('light', lightMode);
        const observer = new MutationObserver(() => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            setLightMode(!isDark);
        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        return () => observer.disconnect();
    }, []);
    useEffect(() => {
        document.body.classList.toggle('light', lightMode);
    }, [lightMode]);

    return (
        <div className="es-wrap">
            <div className="battle-arena">
                <div className="battle-glow-left" />
                <div className="battle-glow-right" />
                <div className="battle-divider-line" />
                <div className="battle-row">
                    <div className="battle-contestant">
                        <div className="battle-logo adobe">A</div>
                        <div>
                            <div className="battle-name adobe">Adobe Sign</div>
                            <div className="battle-tagline">Seat-based · PDF-native · M365</div>
                        </div>
                    </div>
                    <div className="battle-vs">
                        <div className="vs-badge">VS</div>
                    </div>
                    <div className="battle-contestant right">
                        <div className="battle-logo docusign">D</div>
                        <div>
                            <div className="battle-name docusign">DocuSign</div>
                            <div className="battle-tagline">Incumbent · PCC-native · Volume risk</div>
                        </div>
                    </div>
                </div>
                <div className="battle-footer">
                    <span className="battle-decision-badge">Decision Required</span>
                    <span>eSignature governance &nbsp;·&nbsp; March 2026 renewal</span>
                </div>
            </div>

            {isGuest && (
                <div className="guest-notice">
                    <strong>No account needed.</strong> Fill out the discovery section below and submit your input — it goes straight to Anthony for review.
                </div>
            )}

            <RecBanner />
            <StrategicAccordion />

            <div id="discovery" style={{scrollMarginTop:'16px'}}>
                <div className="es-section" style={{marginBottom:'18px'}}>
                    <span className="es-section-label">Your Turn</span>
                    <div className="es-section-line" />
                </div>
                <div className="discovery-leadin">
                    That's my read on the situation. But I'd rather make this call with input than without it. <strong>If you use eSign tools day-to-day, your experience matters more than the contract math.</strong> Tell me what you're actually signing, what's frustrating, and what's great — it takes about 2 minutes and goes directly into my renewal recommendation.
                </div>
                <DiscoveryWizard prefillName={prefillName} />
            </div>

            <OverageCalculator />
            <UnifiedMatrix />
        </div>
    );
}

/* ── Mount ───────────────────────────────────────────────── */

(async () => {
    const { data: { session } } = await _npSupabase.auth.getSession();
    let prefillName = '';
    let isGuest = true;

    if (session) {
        isGuest = false;
        _npUser = session.user;
        const { data: roleData } = await _npSupabase
            .from('user_roles')
            .select('role')
            .eq('user_id', session.user.id)
            .single();
        _npRole = roleData?.role || 'staff';
        npPopulateTopbar();
        renderNav('software');
        prefillName = session.user.email?.split('@')[0] || '';
        const av = document.getElementById('topbarAvatar');
        if (av) { av.textContent = npGetInitials(); av.style.display = 'flex'; }
    }

    const fouc = document.getElementById('np-fouc');
    if (fouc) fouc.remove();
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App prefillName={prefillName} isGuest={isGuest} />);
})();
</script>
</body>
</html>
