<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSign Comparison — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ── Layout ── */
        .main { background: #080f1a; }
        .content { padding: 0; overflow-y: auto; }
        .es-wrap {
            padding: 28px 32px 60px;
            max-width: 1040px;
            margin: 0 auto;
        }

        /* ── Page header ── */
        .es-page-header { margin-bottom: 28px; }
        .es-page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .es-page-sub { font-size: 13px; color: #64748b; }

        /* ── Section divider ── */
        .es-section {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .es-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #475569;
            white-space: nowrap;
        }
        .es-section-line { flex: 1; height: 1px; background: #1e293b; }

        /* ── Recommendation banner ── */
        .rec-banner {
            background: #0c1a2e;
            border: 1px solid #0d9488;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
        }
        .rec-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0d9488 0%, #3b82f6 100%);
        }
        .rec-eyebrow {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #0d9488;
            margin-bottom: 8px;
        }
        .rec-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .rec-sub { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
        .rec-points {
            list-style: none;
            padding: 0; margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 24px;
        }
        .rec-points li {
            font-size: 13px;
            color: #cbd5e1;
            padding-left: 18px;
            position: relative;
            line-height: 1.5;
        }
        .rec-points li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #0d9488;
            font-weight: 700;
        }
        .rec-caveat {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #162032;
            font-size: 12px;
            color: #64748b;
        }
        .rec-caveat a { color: #0d9488; text-decoration: none; }

        /* ── Wizard card ── */
        .wizard-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 32px 36px;
            margin-bottom: 36px;
        }
        .wizard-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .wizard-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 0; }
        .wizard-header { margin-bottom: 24px; }
        .wizard-step-label { font-size: 11px; color: #475569; margin-bottom: 6px; }

        /* Step dots */
        .step-dots { display: flex; gap: 6px; margin-bottom: 24px; }
        .step-dot {
            height: 5px; width: 5px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.25s;
        }
        .step-dot.active { width: 18px; border-radius: 3px; background: #0d9488; }
        .step-dot.done { background: #0d9488; opacity: 0.35; }

        /* Slide animation */
        @keyframes esSlide {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .step-body { animation: esSlide 0.22s ease; }

        /* Form elements */
        .es-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .es-input, .es-select, .es-textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 14px;
            color: #f1f5f9;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.18s;
        }
        .es-input:focus, .es-select:focus, .es-textarea:focus { border-color: #0d9488; }
        .es-select { cursor: pointer; }
        .es-textarea { resize: vertical; min-height: 76px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        .form-group { margin-bottom: 14px; }
        .form-group:last-child { margin-bottom: 0; }

        /* Checkbox grid */
        .check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 4px;
        }
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 11px 13px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            user-select: none;
        }
        .check-item:hover { border-color: #475569; }
        .check-item.checked { border-color: #0d9488; background: rgba(13,148,136,0.05); }
        .check-box {
            width: 15px; height: 15px;
            border: 1.5px solid #334155;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: transparent;
        }
        .check-item.checked .check-box {
            background: #0d9488;
            border-color: #0d9488;
            color: white;
        }
        .check-text { font-size: 13px; color: #cbd5e1; line-height: 1.4; }

        /* Vote options */
        .vote-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .vote-option {
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 10px;
            padding: 15px 14px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.18s, background 0.18s;
        }
        .vote-option:hover { border-color: #475569; }
        .vote-option.selected { border-color: #0d9488; background: rgba(13,148,136,0.06); }
        .vote-icon { font-size: 20px; margin-bottom: 8px; }
        .vote-label {
            font-size: 12px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .vote-option.selected .vote-label { color: #0d9488; }
        .vote-desc { font-size: 11px; color: #64748b; line-height: 1.4; }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
        }
        .btn-primary {
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
            font-family: inherit;
        }
        .btn-primary:hover { background: #0f766e; }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-ghost {
            background: transparent;
            color: #64748b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.18s, color 0.18s;
        }
        .btn-ghost:hover { border-color: #475569; color: #94a3b8; }

        /* Error */
        .es-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #ef4444;
            margin-top: 10px;
        }

        /* Success */
        .wizard-success {
            text-align: center;
            padding: 36px 20px;
            animation: esSlide 0.3s ease;
        }
        .success-ring {
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 2px solid #0d9488;
            background: rgba(13,148,136,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 22px;
            color: #0d9488;
        }
        .success-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        .success-desc { font-size: 14px; color: #94a3b8; line-height: 1.6; }
        .success-desc strong { color: #0d9488; }

        /* ── Calculator ── */
        .calc-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 36px;
        }
        .calc-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .calc-desc { font-size: 13px; color: #94a3b8; margin-bottom: 26px; }

        /* Sliders */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }
        .slider-lbl {
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
            min-width: 130px;
        }
        .es-range {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            cursor: pointer;
            height: 4px;
        }
        .es-range::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
            background: #334155;
        }
        .es-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 17px; height: 17px;
            border-radius: 50%;
            background: #0d9488;
            margin-top: -6.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .es-range.danger::-webkit-slider-thumb { background: #ef4444; }
        .es-range::-moz-range-track {
            height: 4px;
            border-radius: 2px;
            background: #334155;
        }
        .es-range::-moz-range-thumb {
            width: 17px; height: 17px;
            border-radius: 50%;
            background: #0d9488;
            border: none;
            cursor: pointer;
        }
        .es-range.danger::-moz-range-thumb { background: #ef4444; }
        .slider-val {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            min-width: 72px;
            text-align: right;
        }
        .slider-val.danger { color: #ef4444; }
        .slider-hint {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 20px;
            padding-left: 144px;
        }

        /* Cost cards */
        .cost-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .cost-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 18px 20px;
        }
        .cost-eyebrow {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 2px;
        }
        .cost-vendor { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 10px; }
        .cost-amount {
            font-size: 26px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .cost-amount.danger { color: #ef4444; }
        .cost-amount.safe { color: #0d9488; }
        .cost-detail { font-size: 12px; color: #64748b; line-height: 1.6; }
        .cost-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .cost-badge.bad { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
        .cost-badge.good { background: rgba(13,148,136,0.08); border: 1px solid rgba(13,148,136,0.2); color: #0d9488; }

        /* Bar chart */
        .bar-chart-wrap {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            padding: 0 4px;
        }
        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .bar-rect {
            width: 44px;
            border-radius: 4px 4px 0 0;
            transition: height 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
            align-self: flex-end;
        }
        .bar-col-lbl { font-size: 10px; color: #64748b; text-align: center; }
        .bar-compare-text {
            flex: 1;
            border-left: 1px dashed #334155;
            padding-left: 18px;
            font-size: 12px;
            color: #475569;
            line-height: 1.7;
            align-self: center;
        }

        /* ── Matrix ── */
        .matrix-wrap {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .matrix-head { padding: 24px 28px 16px; }
        .matrix-head-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .matrix-head-desc { font-size: 13px; color: #94a3b8; }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
        }
        .matrix-table th {
            padding: 10px 20px;
            background: #0f172a;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            text-align: left;
        }
        .matrix-table th:nth-child(2),
        .matrix-table th:nth-child(3) { text-align: center; width: 100px; }
        .matrix-table td {
            padding: 12px 20px;
            border-top: 1px solid #1a2535;
            font-size: 13px;
            color: #cbd5e1;
            vertical-align: top;
        }
        .matrix-table td:nth-child(2),
        .matrix-table td:nth-child(3) { text-align: center; vertical-align: middle; }
        .matrix-table tbody tr:hover td { background: rgba(255,255,255,0.015); }
        .m-feat { font-weight: 500; color: #e2e8f0; }
        .m-note { font-size: 11px; color: #475569; margin-top: 2px; }
        .m-status { font-size: 13px; font-weight: 700; }
        .m-status.full { color: #0d9488; }
        .m-status.partial { color: #f59e0b; }
        .m-status.none { color: #ef4444; }
        .m-status.warn { color: #f59e0b; }
        .matrix-legend {
            padding: 12px 20px;
            border-top: 1px solid #1a2535;
            display: flex;
            gap: 20px;
            font-size: 11px;
            color: #475569;
        }
        .matrix-legend span { display: flex; align-items: center; gap: 5px; }

        /* ── Accordion ── */
        .accordion-wrap {
            background: #1a2540;
            border: 1px solid #2a3f5f;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
            position: relative;
        }
        .accordion-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0d9488 0%, #3b82f680 100%);
        }
        .accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 28px;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.18s;
        }
        .accordion-btn:hover { background: rgba(13,148,136,0.04); }
        .accordion-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #0d9488;
            margin-bottom: 5px;
        }
        .accordion-title {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            color: #f1f5f9;
        }
        .accordion-chevron {
            color: #0d9488;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .accordion-chevron.open { transform: rotate(180deg); }
        .accordion-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.38s ease;
        }
        .accordion-body.open { max-height: 900px; }
        .accordion-inner {
            padding: 0 28px 28px;
            border-top: 1px solid #243450;
        }
        .strat-block { margin-top: 20px; }
        .strat-title {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .strat-text { font-size: 13px; color: #94a3b8; line-height: 1.7; }
        .strat-callout {
            background: #0f1e30;
            border-left: 3px solid #0d9488;
            border-radius: 0 8px 8px 0;
            padding: 14px 18px;
            margin: 16px 0;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
            font-style: italic;
        }

        /* ── Guest notice ── */
        .guest-notice {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 28px;
            font-size: 13px;
            color: #64748b;
        }
        .guest-notice strong { color: #94a3b8; }

        /* ── Discovery lead-in ── */
        .discovery-leadin {
            background: #131e2e;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
        }
        .discovery-leadin strong { color: #f1f5f9; }

        /* 3-col cost row */
        .cost-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        /* ── Market comparison ── */
        .mktcmp-wrap {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .mktcmp-head { padding: 24px 28px 16px; }
        .mktcmp-title {
            font-family: 'DM Serif Display', serif;
            font-size: 21px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .mktcmp-desc { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }

        /* Pill toggles */
        .tool-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
        .tool-pill {
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1.5px solid #334155;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .tool-pill:hover { border-color: #475569; color: #94a3b8; }
        .tool-pill.on-current  { border-color: #0d9488; color: #0d9488; background: rgba(13,148,136,0.07); }
        .tool-pill.on-proposed { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.07); }
        .tool-pill.on-alt      { border-color: #a855f7; color: #a855f7; background: rgba(168,85,247,0.07); }
        .tool-pill.on-ent      { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.07); }

        /* Table scroll wrapper */
        .mktcmp-scroll { overflow-x: auto; }
        .mktcmp-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 560px;
        }

        /* Tool header cells */
        .mktcmp-table th {
            padding: 0;
            background: #0f172a;
            border-left: 1px solid #1a2535;
            vertical-align: top;
        }
        .mktcmp-table th:first-child { border-left: none; }
        .th-feature {
            padding: 12px 16px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #475569;
            text-align: left;
            min-width: 180px;
        }
        .th-tool {
            padding: 14px 14px 12px;
            text-align: center;
            min-width: 120px;
        }
        .th-tool-name {
            font-size: 13px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 3px;
        }
        .th-tool-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .tag-current  { background: rgba(13,148,136,0.15);  color: #0d9488; }
        .tag-proposed { background: rgba(59,130,246,0.12);  color: #60a5fa; }
        .tag-alt      { background: rgba(168,85,247,0.12);  color: #c084fc; }
        .tag-ent      { background: rgba(245,158,11,0.12);  color: #fbbf24; }
        .th-tool-cost {
            font-size: 11px;
            color: #94a3b8;

/* ── Discovery wizard ────────────────────────────────────── */

function DiscoveryWizard({ prefillName }) {
    const [step,       setStep]       = useState(1);
    const [form,       setForm]       = useState({});
    const [submitting, setSubmitting] = useState(false);
    const [submitted,  setSubmitted]  = useState(false);
    const [error,      setError]      = useState('');

    const update = patch => setForm(prev => ({ ...prev, ...patch }));

    const submit = async finalPatch => {
        const payload = { ...form, ...finalPatch };
        setSubmitting(true);
        setError('');
        try {
            const { error: err } = await _npSupabase
                .from('esign_stakeholder_input')
                .insert([{
                    name:          payload.name,
                    title:         payload.title         || null,
                    department:    payload.department    || null,
                    use_cases:     payload.use_cases?.length ? payload.use_cases : null,
                    pain_points:   payload.pain_points   || null,
                    ideal_outcome: payload.ideal_outcome || null,
                    vote_choice:   payload.vote_choice,
                    comments:      payload.comments      || null,
                }]);
            if (err) throw err;
            setForm(prev => ({ ...prev, ...finalPatch }));
            setSubmitted(true);
        } catch (e) {
            setError(e.message || 'Submission failed. Please try again.');
        } finally {
            setSubmitting(false);
        }
    };

    if (submitted) {
        const voted = VOTE_OPTIONS.find(o => o.id === form.vote_choice)?.label || form.vote_choice;
        return (
            <div className="wizard-card">
                <div className="wizard-success">
                    <div className="success-ring">✓</div>
                    <div className="success-title">Input received. Thank you, {form.name}.</div>
                    <div className="success-desc">
                        Your vote for <strong>{voted}</strong> has been recorded.<br />
                        Anthony will review all stakeholder input before the March 2026 renewal decision.
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="wizard-card">
            <StepDots current={step} total={4} />
            {step === 1 && <Step1 data={form} onChange={update} onNext={() => setStep(2)} prefillName={prefillName} />}
            {step === 2 && <Step2 data={form} onChange={update} onBack={() => setStep(1)} onNext={() => setStep(3)} />}
            {step === 3 && <Step3 data={form} onChange={update} onBack={() => setStep(2)} onNext={() => setStep(4)} />}
            {step === 4 && <Step4 data={form} onChange={update} onBack={() => setStep(3)} onSubmit={submit} submitting={submitting} error={error} />}
        </div>
    );
}

/* ── Overage calculator ──────────────────────────────────── */

const PANDA_PPU = 49; // PandaDoc Business (HIPAA BAA tier) $/seat/mo

function OverageCalculator() {
    const [monthly,    setMonthly]    = useState(1200);
    const [abSeats,    setAbSeats]    = useState(25);
    const [pdSeats,    setPdSeats]    = useState(25);

    const overage   = Math.max(0, monthly - DS_LIMIT);
    const isDanger  = overage > 0;
    const dsAnnual  = DS_BASE + overage * DS_OVER * 12;
    const abAnnual  = abSeats * ADOBE_PPU * 12;
    const pdAnnual  = pdSeats * PANDA_PPU * 12;
    const MAX_CHART = Math.max(dsAnnual, abAnnual, pdAnnual, 25000);
    const dsH       = Math.round((dsAnnual / MAX_CHART) * 88);
    const abH       = Math.round((abAnnual / MAX_CHART) * 88);
    const pdH       = Math.round((pdAnnual / MAX_CHART) * 88);
    const fmt       = n => '$' + Math.round(n).toLocaleString();
    const cheapest  = Math.min(dsAnnual, abAnnual, pdAnnual);

    return (
        <div className="calc-card">
            <div className="es-section">
                <span className="es-section-label">Cost Calculator</span>
                <div className="es-section-line" />
            </div>
            <div className="calc-title">Cost vs. Volume</div>
            <div className="calc-desc">
                Adjust the sliders to model your actual usage. DocuSign charges per envelope — the other two charge per seat, no matter how many you send.
            </div>

            <div className="slider-row">
                <span className="slider-lbl">Monthly Envelopes</span>
                <input
                    type="range"
                    className={`es-range${isDanger ? ' danger' : ''}`}

                    onChange={e => setMonthly(Number(e.target.value))}

                <span className={`slider-val${isDanger ? ' danger' : ''}`}>{monthly.toLocaleString()}</span>
            </div>
            <div className="slider-hint">
                DocuSign limit: 1,666/mo &nbsp;·&nbsp;&nbsp;
                {isDanger
                    ? <span style={{color:'#ef4444'}}>{overage.toLocaleString()} over → +${(overage * DS_OVER).toLocaleString(undefined, {maximumFractionDigits:0})}/mo in fees</span>
                    : <span>{(DS_LIMIT - monthly).toLocaleString()} under limit — no overage</span>
                }
            </div>

            <div className="slider-row">
                <span className="slider-lbl">Adobe Sign Seats</span>
                <input type="range" className="es-range" min="5" max="100" value={abSeats}
                    onChange={e => setAbSeats(Number(e.target.value))} />
                <span className="slider-val">{abSeats} users</span>
            </div>
            <div className="slider-hint">@ $35/seat/mo · no envelope limits</div>

            <div className="slider-row">
                <span className="slider-lbl">PandaDoc Seats</span>
                <input type="range" className="es-range" min="5" max="100" value={pdSeats}
                    onChange={e => setPdSeats(Number(e.target.value))} />
                <span className="slider-val">{pdSeats} users</span>
            </div>
            <div className="slider-hint">@ $49/seat/mo Business tier (HIPAA BAA) · no envelope limits</div>

            <div className="cost-row-3">
                <div className="cost-card">
                    <div className="cost-eyebrow">Current</div>
                    <div className="cost-vendor">DocuSign</div>
                    <div className={`cost-amount${isDanger ? ' danger' : dsAnnual === cheapest ? ' safe' : ''}`}>{fmt(dsAnnual)}/yr</div>
                    <div className="cost-detail">
                        Base: $19,800/yr (20K envelopes)<br />
                        {isDanger ? `+${fmt(overage * DS_OVER * 12)}/yr overage` : 'No overage at this volume'}
                    </div>
                    {isDanger && <div className="cost-badge bad">⚠ +{fmt(overage * DS_OVER * 12)}/yr bleed</div>}
                    {!isDanger && dsAnnual === cheapest && <div className="cost-badge good">Lowest cost at this volume</div>}
                </div>
                <div className="cost-card">
                    <div className="cost-eyebrow">Proposed</div>
                    <div className="cost-vendor">Adobe Sign</div>
                    <div className={`cost-amount${abAnnual === cheapest ? ' safe' : ''}`}>{fmt(abAnnual)}/yr</div>
                    <div className="cost-detail">
                        {abSeats} seats × $35/mo × 12<br />
                        No envelope limits
                    </div>
                    {abAnnual === cheapest && <div className="cost-badge good">Lowest cost at this volume</div>}
                </div>
                <div className="cost-card">
                    <div className="cost-eyebrow">Alternative</div>
                    <div className="cost-vendor">PandaDoc Business</div>
                    <div className={`cost-amount${pdAnnual === cheapest ? ' safe' : ''}`}>{fmt(pdAnnual)}/yr</div>
                    <div className="cost-detail">
                        {pdSeats} seats × $49/mo × 12<br />
                        No envelope limits · includes CLM
                    </div>
                    {pdAnnual === cheapest && <div className="cost-badge good">Lowest cost at this volume</div>}

                    <div className="bar-col-lbl">Adobe Sign</div>
                </div>
                <div className="bar-col">
                    <div className="bar-rect" style={{ height: `${pdH}px`, minHeight: '4px', background: '#f59e0b' }} />
                    <div className="bar-col-lbl">PandaDoc</div>
                </div>
                <div className="bar-compare-text">
                    <div style={{fontWeight:600, color:'#64748b', marginBottom:'4px', fontSize:'11px'}}>
                        AT {monthly.toLocaleString()} ENVELOPES/MO
                    </div>
                    DocuSign: <span style={{color: isDanger ? '#ef4444' : '#f1f5f9', fontWeight:600}}>{fmt(dsAnnual)}/yr</span><br />
                    Adobe ({abSeats} seats): <span style={{color:'#f1f5f9', fontWeight:600}}>{fmt(abAnnual)}/yr</span><br />
                    PandaDoc ({pdSeats} seats): <span style={{color:'#f1f5f9', fontWeight:600}}>{fmt(pdAnnual)}/yr</span><br />
                    <span style={{color:'#0d9488', fontSize:'11px', marginTop:'4px', display:'inline-block'}}>
                        Cheapest: {dsAnnual === cheapest ? 'DocuSign' : abAnnual === cheapest ? 'Adobe Sign' : 'PandaDoc'} at {fmt(cheapest)}/yr
                    </span>
                </div>
            </div>
        </div>
    );
}

/* ── Market comparison ───────────────────────────────────── */

const TAG_CLS = { current: 'tag-current', proposed: 'tag-proposed', alt: 'tag-alt', ent: 'tag-ent' };
const PILL_ON = { current: 'on-current', proposed: 'on-proposed', alt: 'on-alt', ent: 'on-ent' };

function CellStatus({ val }) {
    const map = {
        full:    <span className="cs cs-full">✓</span>,
        partial: <span className="cs cs-partial">~</span>,
        none:    <span className="cs cs-none">✕</span>,
        warn:    <span className="cs cs-warn">!</span>,
    };
    return map[val] || null;
}

function MarketComparison() {
    const [active, setActive] = useState(MKT_TOOLS.map(t => t.id));

    const toggle = id => setActive(prev =>
        prev.includes(id)
            ? prev.length > 1 ? prev.filter(x => x !== id) : prev
            : [...prev, id]
    );

    const visible = MKT_TOOLS.filter(t => active.includes(t.id));

    return (
        <div className="mktcmp-wrap">
            <div className="mktcmp-head">
                <div className="es-section" style={{marginBottom:'4px'}}>
                    <span className="es-section-label">Full Market Comparison</span>
                    <div className="es-section-line" />
                </div>
                <div className="mktcmp-title">All Options on the Table</div>
                <div className="mktcmp-desc">
                    Not just DocuSign vs Adobe — here's the full landscape of tools relevant to NACS. Toggle tools on or off to compare.
                </div>
                <div className="tool-pills">
                    {MKT_TOOLS.map(t => (
                        <button
                            key={t.id}
                            className={`tool-pill${active.includes(t.id) ? ' ' + PILL_ON[t.tagCls] : ''}`}
                            onClick={() => toggle(t.id)}
                        >
                            {t.name}
                        </button>
                    ))}
                </div>
            </div>
            <div className="mktcmp-scroll">
                <table className="mktcmp-table">
                    <thead>
                        <tr>
                            <th><div className="th-feature">Feature</div></th>
                            {visible.map(t => (
                                <th key={t.id}>
                                    <div className="th-tool">
                                        <div className="th-tool-name">{t.name}</div>
                                        <div>
                                            <span className={`th-tool-tag ${TAG_CLS[t.tagCls]}`}>{t.tag}</span>
                                        </div>
                                        <div className="th-tool-cost">{t.cost}<br />{t.model}</div>
                                    </div>
                                </th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {MKT_ROWS.map(row => (
                            <tr key={row.key}>
                                <td>{row.label}</td>
                                {visible.map(t => (
                                    <td key={t.id}><CellStatus val={t[row.key]} /></td>
                                ))}
                            </tr>
                        ))}
                        <tr>
                            <td style={{color:'#64748b', fontStyle:'italic', fontSize:'12px'}}>Notes</td>
                            {visible.map(t => (
                                <td key={t.id} style={{fontSize:'11px', color:'#475569', textAlign:'left'}}>{t.note}</td>
                            ))}
                        </tr>
                    </tbody>
                </table>
            </div>
            <div className="mktcmp-legend">
                <span><span className="cs cs-full">✓</span> Full support</span>
                <span><span className="cs cs-partial">~</span> Partial / requires work</span>
                <span><span className="cs cs-none">✕</span> Not available</span>
                <span><span className="cs cs-warn">!</span> Risk / watch</span>
            </div>
        </div>
    );
}

/* ── Compliance matrix ───────────────────────────────────── */

function ComplianceMatrix() {
    return (
        <div className="matrix-wrap">
            <div className="matrix-head">
                <div className="es-section" style={{marginBottom:'4px'}}>
                    <span className="es-section-label">Compliance & Integration Matrix</span>
                    <div className="es-section-line" />
                </div>
                <div className="matrix-head-title">Feature Comparison</div>
                <div className="matrix-head-desc">
                    Both platforms are healthcare-ready. The differentiators are EHR integration depth and pricing structure.
                </div>
            </div>
            <table className="matrix-table">
                <thead>
                    <tr>
                        <th>Feature</th>
                        <th>DocuSign</th>
                        <th>Adobe Sign</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    {MATRIX.map(row => (
                        <tr key={row.feature}>
                            <td>
                                <div className="m-feat">{row.feature}</div>
                            </td>
                            <td>
                                <span className={`m-status ${STATUS[row.ds].cls}`}>{STATUS[row.ds].icon}</span>
                            </td>
                            <td>
                                <span className={`m-status ${STATUS[row.ab].cls}`}>{STATUS[row.ab].icon}</span>
                            </td>
                            <td style={{fontSize:'12px', color:'#475569'}}>{row.note}</td>
                        </tr>
                    ))}
                </tbody>
            </table>
            <div className="matrix-legend">
                <span><span style={{color:'#0d9488', fontWeight:700}}>✓</span> Full support</span>
                <span><span style={{color:'#f59e0b', fontWeight:700}}>~</span> Partial / requires work</span>
                <span><span style={{color:'#ef4444', fontWeight:700}}>✕</span> Not available</span>
                <span><span style={{color:'#f59e0b', fontWeight:700}}>!</span> Risk / watch</span>
            </div>
        </div>
    );
}

/* ── Strategic accordion ─────────────────────────────────── */

function StrategicAccordion() {
    const [open, setOpen] = useState(false);
    return (
        <div className="accordion-wrap">
            <button className="accordion-btn" onClick={() => setOpen(o => !o)}>
                <div>
                    <div className="accordion-eyebrow">My Perspective</div>
                    <div className="accordion-title">Strategic Consolidation</div>
                </div>
                <svg
                    className={`accordion-chevron${open ? ' open' : ''}`}
                    width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" strokeWidth="2"
                >
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div className={`accordion-body${open ? ' open' : ''}`}>
                <div className="accordion-inner">
                    <div className="strat-block">
                        <div className="strat-title">The real problem isn't which tool — it's what we're signing</div>
                        <div className="strat-text">
                            NACS uses DocuSign for two very different things: legally-binding documents (resident admissions, employment contracts, vendor agreements) and internal confirmations (staff acknowledging they read a policy or completed training). These are not the same need — and using a $5.80-per-signature legal tool for the second category is where the budget risk lives.
                        </div>
                    </div>
                    <div className="strat-callout">
                        "We're paying premium rates to have staff click 'I agree' on a handbook. That same workflow can run on something we already own — or build — at a fraction of the cost, with better visibility into who's actually in compliance."
                    </div>
                    <div className="strat-block">
                        <div className="strat-title">The recommended split</div>
                        <div className="strat-text">
                            Keep DocuSign for everything that needs a legally-binding signature: resident admissions, employment agreements, vendor contracts. These need a formal audit trail and connect directly to PointClickCare and MatrixCare (our EHR systems) without any custom setup.<br /><br />
                            Move internal sign-offs to something simpler. Staff confirming they read the employee handbook, completing a required training, or acknowledging a policy update — those just need a timestamp and a record, not a $5.80-per-click legal signature. This could be a dedicated training platform, a module added to NorthPoint, or even an existing system NACS already pays for.
                        </div>
                    </div>
                    <div className="strat-block">
                        <div className="strat-title">Why not just switch to Adobe Sign?</div>
                        <div className="strat-text">
                            Adobe Sign solves the overage problem (you pay per seat, not per signature) but creates new ones: reconnecting PointClickCare and MatrixCare, retraining every facility, and moving all existing templates. At current usage levels, DocuSign is still cheaper. Adobe only wins on price if signature volume consistently exceeds ~2,000/month — check the calculator above.<br /><br />
                            Adobe's real strength is PDF creation and editing. If NACS standardizes on Microsoft 365 and needs heavy document-building workflows, that's worth revisiting at the 2027 renewal.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ── Recommendation banner ───────────────────────────────── */

function RecBanner() {
    return (
        <div className="rec-banner">
            <div className="rec-eyebrow">IT Director's Recommendation — March 2026 Renewal</div>
            <div className="rec-title">Renew DocuSign. Eliminate the overage risk.</div>
            <div className="rec-sub">Based on contract terms, current usage patterns, and EHR integration requirements</div>
            <ul className="rec-points">
                <li>PointClickCare and MatrixCare integrations are native to DocuSign — rebuilding them in Adobe Sign requires custom API work and re-validation</li>
                <li>At current envelope volume (under 1,666/mo), DocuSign at $19,800/yr beats Adobe Sign at most seat counts</li>
                <li>Moving internal policy sign-offs (staff handbook, training confirmations) out of DocuSign eliminates the $5.80 overage risk entirely — those don't need a legally-binding signature, just a record</li>
                <li>No migration cost, no retraining, no re-integration work — the ROI math on switching doesn't close at this volume</li>
            </ul>
            <div className="rec-caveat">
                Don't agree? <a href="#discovery">Fill out the discovery section below</a> — your use case might change this analysis.
            </div>
        </div>
    );
}

/* ── App root ────────────────────────────────────────────── */

function App({ prefillName, isGuest }) {
    return (
        <div className="es-wrap">
            <div className="es-page-header">
                <div className="es-page-title">Adobe Sign vs. DocuSign</div>
                <div className="es-page-sub">eSignature governance · March 2026 renewal decision</div>
            </div>

            {isGuest && (
                <div className="guest-notice">
                    <strong>No account needed.</strong> Fill out the discovery section below and submit your input — it goes straight to Anthony for review.
                </div>
            )}

            <RecBanner />
            <StrategicAccordion />

            <div id="discovery" style={{scrollMarginTop:'16px'}}>
                <div className="es-section" style={{marginBottom:'18px'}}>
                    <span className="es-section-label">Your Turn</span>
                    <div className="es-section-line" />
                </div>
                <div className="discovery-leadin">
                    That's my read on the situation. But I'd rather make this call with input than without it. <strong>If you use eSign tools day-to-day, your experience matters more than the contract math.</strong> Tell me what you're actually signing, what's frustrating, and what winning looks like — it takes about 2 minutes and goes directly into my renewal recommendation.
                </div>
                <DiscoveryWizard prefillName={prefillName} />
            </div>

            <OverageCalculator />
            <ComplianceMatrix />
            <MarketComparison />
        </div>
    );
}

/* ── Mount ───────────────────────────────────────────────── */

(async () => {
    const { data: { session } } = await _npSupabase.auth.getSession();
    let prefillName = '';
    let isGuest = true;

    if (session) {
        isGuest = false;
        _npUser = session.user;
        const { data: roleData } = await _npSupabase
            .from('user_roles')
            .select('role')
            .eq('user_id', session.user.id)
            .single();
        _npRole = roleData?.role || 'staff';
        npPopulateTopbar();
        renderNav('software');
        prefillName = session.user.email?.split('@')[0] || '';
        const av = document.getElementById('topbarAvatar');
        if (av) { av.textContent = npGetInitials(); av.style.display = 'flex'; }
    }

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App prefillName={prefillName} isGuest={isGuest} />);
})();
</script>
</body>
</html>
