name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mapper-app/package-lock.json

      - name: Build Data Migration Mapper
        working-directory: mapper-app
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy all static site files — exclude mapper-app source and build artifacts
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='mapper-app' \
            --exclude='_site' \
            . _site/
          # Place the built mapper at the correct sub-path
          mkdir -p _site/projects/data-migration-mapper
          cp -r mapper-app/dist/. _site/projects/data-migration-mapper/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
