<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWOT Analysis — NorthPoint</title>
    <link rel="stylesheet" href="/northpoint.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #080f1a; }
        .main { background: #080f1a; }
        .content { padding: 0; overflow-y: auto; }

        .swot-wrap {
            padding: 28px 32px 80px;
            max-width: 1100px;
            margin: 0 auto;
            font-size: 15px;
        }

        /* ── Hero ── */
        .sw-hero {
            background: linear-gradient(140deg, #0c1a2e 0%, #0f2040 100%);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 44px 36px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .sw-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
        }
        .sw-eyebrow {
            font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #10b981; margin-bottom: 12px;
        }
        .sw-title {
            font-family: 'DM Serif Display', serif;
            font-size: 36px; color: #f1f5f9; margin-bottom: 8px;
        }
        .sw-subtitle {
            font-size: 15px; color: #64748b; line-height: 1.6;
            max-width: 580px; margin-bottom: 24px;
        }
        .sw-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .sw-tag {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 4px 11px;
            font-size: 11px; color: #64748b;
        }

        /* ── Axis labels ── */
        .sw-axis-row {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; margin-bottom: 6px;
        }
        .sw-axis-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: #334155;
            text-align: center; padding: 3px 0;
        }
        .sw-axis-sep { height: 1px; background: #1e293b; margin-bottom: 14px; }

        /* ── Grid ── */
        .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* ── Quadrant card ── */
        .sw-quad {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 14px;
            overflow: hidden;
        }
        .sw-quad-head {
            padding: 16px 20px 14px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #1a2535;
        }
        .sw-quad.s .sw-quad-head { border-top: 2px solid #22c55e; }
        .sw-quad.w .sw-quad-head { border-top: 2px solid #f59e0b; }
        .sw-quad.o .sw-quad-head { border-top: 2px solid #3b82f6; }
        .sw-quad.t .sw-quad-head { border-top: 2px solid #ef4444; }

        .sw-letter {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; flex-shrink: 0;
        }
        .sw-quad.s .sw-letter { background: rgba(34,197,94,0.12);  color: #22c55e; }
        .sw-quad.w .sw-letter { background: rgba(245,158,11,0.12); color: #f59e0b; }
        .sw-quad.o .sw-letter { background: rgba(59,130,246,0.12); color: #3b82f6; }
        .sw-quad.t .sw-letter { background: rgba(239,68,68,0.12);  color: #ef4444; }

        .sw-quad-info { flex: 1; min-width: 0; }
        .sw-quad-name { font-size: 15px; font-weight: 700; color: #f1f5f9; }
        .sw-quad-sub  { font-size: 11px; color: #475569; margin-top: 1px; }
        .sw-count {
            font-size: 11px; font-weight: 700;
            padding: 3px 9px; border-radius: 20px;
            background: #1e293b; color: #64748b;
        }

        /* ── Items ── */
        .sw-items { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 7px; }

        .sw-item {
            border-radius: 8px; padding: 10px 12px;
            transition: filter 0.15s;
        }
        .sw-quad.s .sw-item { background: rgba(34,197,94,0.05);  border-left: 2px solid rgba(34,197,94,0.25); }
        .sw-quad.w .sw-item { background: rgba(245,158,11,0.05); border-left: 2px solid rgba(245,158,11,0.25); }
        .sw-quad.o .sw-item { background: rgba(59,130,246,0.05); border-left: 2px solid rgba(59,130,246,0.25); }
        .sw-quad.t .sw-item { background: rgba(239,68,68,0.05);  border-left: 2px solid rgba(239,68,68,0.25); }
        .sw-item:hover { filter: brightness(1.18); }

        .sw-item-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 8px; margin-bottom: 3px;
        }
        .sw-item-label { font-size: 13px; font-weight: 700; color: #e2e8f0; line-height: 1.3; }
        .sw-item-desc  { font-size: 12px; color: #64748b; line-height: 1.55; }

        .sw-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        /* Priority badges */
        .sw-pri {
            font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
            text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
            white-space: nowrap;
        }
        .sw-pri.critical { background: rgba(239,68,68,0.15);  color: #f87171; }
        .sw-pri.high     { background: rgba(249,115,22,0.15); color: #fb923c; }
        .sw-pri.medium   { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .sw-pri.low      { background: rgba(100,116,139,0.15);color: #94a3b8; }

        /* Edit controls */
        .sw-icon-btn {
            background: transparent; border: none; cursor: pointer;
            color: #2d3f55; padding: 2px 5px; border-radius: 4px;
            font-size: 13px; line-height: 1; transition: color 0.15s, background 0.15s;
        }
        .sw-icon-btn:hover     { color: #94a3b8; background: rgba(255,255,255,0.06); }
        .sw-icon-btn.del:hover { color: #ef4444; }

        .sw-add-btn {
            width: 100%; background: transparent;
            border: 1px dashed #1e293b;
            border-radius: 8px; padding: 8px 12px;
            color: #2d3f55; font-size: 12px; cursor: pointer;
            text-align: center; font-family: inherit;
            transition: all 0.18s; margin-top: 4px;
        }
        .sw-add-btn:hover { border-color: #334155; color: #64748b; background: rgba(255,255,255,0.02); }

        /* ── Modal ── */
        .sw-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 16px;
        }
        .sw-modal {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 14px; padding: 28px 28px 24px;
            width: 100%; max-width: 480px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .sw-modal-title { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 20px; }

        .sw-label {
            display: block; font-size: 12px; font-weight: 500;
            color: #94a3b8; margin-bottom: 6px;
        }
        .sw-input, .sw-textarea {
            width: 100%; background: #080f1a; border: 1px solid #334155;
            border-radius: 8px; padding: 9px 12px; font-size: 14px;
            color: #f1f5f9; outline: none; box-sizing: border-box;
            font-family: inherit; transition: border-color 0.18s;
        }
        .sw-input:focus, .sw-textarea:focus { border-color: #0d9488; }
        .sw-textarea { min-height: 80px; resize: vertical; }
        .sw-form-group { margin-bottom: 14px; }

        .sw-pri-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .sw-pri-opt {
            padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
            border: 1.5px solid #334155; background: transparent; color: #64748b;
            cursor: pointer; transition: all 0.18s; font-family: inherit;
        }
        .sw-pri-opt.active.critical { border-color: #ef4444; color: #f87171; background: rgba(239,68,68,0.1); }
        .sw-pri-opt.active.high     { border-color: #f97316; color: #fb923c; background: rgba(249,115,22,0.1); }
        .sw-pri-opt.active.medium   { border-color: #f59e0b; color: #fbbf24; background: rgba(245,158,11,0.1); }
        .sw-pri-opt.active.low      { border-color: #64748b; color: #94a3b8; background: rgba(100,116,139,0.1); }

        .sw-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
        .sw-btn-primary {
            background: #0d9488; color: white; border: none;
            border-radius: 8px; padding: 9px 20px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: background 0.18s;
        }
        .sw-btn-primary:hover    { background: #0f766e; }
        .sw-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .sw-btn-ghost {
            background: transparent; color: #64748b;
            border: 1px solid #334155; border-radius: 8px;
            padding: 9px 16px; font-size: 13px;
            cursor: pointer; font-family: inherit;
            transition: border-color 0.18s, color 0.18s;
        }
        .sw-btn-ghost:hover { border-color: #475569; color: #94a3b8; }

        /* ── Strategy layer ── */
        .sw-strategy {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 14px; overflow: hidden; margin-top: 20px;
        }
        .sw-strategy-btn {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; background: transparent; border: none;
            cursor: pointer; text-align: left; transition: background 0.18s;
        }
        .sw-strategy-btn:hover { background: rgba(255,255,255,0.02); }
        .sw-strategy-eyebrow {
            font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: #475569; margin-bottom: 4px;
        }
        .sw-strategy-title { font-size: 17px; font-weight: 700; color: #f1f5f9; }
        .sw-strategy-body {
            overflow: hidden; max-height: 0;
            transition: max-height 0.38s ease;
        }
        .sw-strategy-body.open { max-height: 900px; }
        .sw-strategy-inner { padding: 0 24px 28px; border-top: 1px solid #1a2535; }
        .sw-strategy-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px;
        }
        .sw-strat-card {
            background: #080f1a; border: 1px solid #1e293b;
            border-radius: 10px; padding: 16px;
        }
        .sw-strat-card-lbl {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; margin-bottom: 4px;
        }
        .sw-strat-card.so { border-top: 2px solid #22c55e; }
        .sw-strat-card.so .sw-strat-card-lbl { color: #22c55e; }
        .sw-strat-card.st { border-top: 2px solid #3b82f6; }
        .sw-strat-card.st .sw-strat-card-lbl { color: #60a5fa; }
        .sw-strat-card.wo { border-top: 2px solid #f59e0b; }
        .sw-strat-card.wo .sw-strat-card-lbl { color: #fbbf24; }
        .sw-strat-card.wt { border-top: 2px solid #ef4444; }
        .sw-strat-card.wt .sw-strat-card-lbl { color: #f87171; }
        .sw-strat-card-sub { font-size: 12px; color: #475569; margin-bottom: 10px; }

        .sw-loading { text-align: center; padding: 60px 32px; color: #475569; font-size: 14px; }

        @media (max-width: 740px) {
            .sw-grid         { grid-template-columns: 1fr; }
            .sw-axis-row     { grid-template-columns: 1fr; }
            .sw-strategy-grid{ grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="layout">
    <div id="rail-mount"></div>
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <a href="/index.html" class="topbar-name">NorthPoint</a>
                <div class="topbar-sep"></div>
                <span class="topbar-section">SWOT Analysis</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="currentDate"></span>
                <span class="topbar-role" id="topbarRole"></span>
                <div class="topbar-avatar" id="topbarAvatar" style="display:none"></div>
            </div>
        </header>
        <div class="content">
            <div id="app-root">
                <div style="padding:60px 32px;text-align:center;color:#475569;font-size:14px;">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script src="/nav.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── Config ───────────────────────────────────────────────── */

const QUADRANTS = [
    { key: 's', label: 'Strengths',     sub: 'Internal advantages to build on' },
    { key: 'w', label: 'Weaknesses',    sub: 'Internal gaps that require attention' },
    { key: 'o', label: 'Opportunities', sub: 'External factors we can leverage' },
    { key: 't', label: 'Threats',       sub: 'External risks that could limit progress' },
];

const PRIORITIES = ['critical', 'high', 'medium', 'low'];

const STRATEGY_CARDS = [
    { key: 'so', cls: 'so', label: 'SO — Leverage', sub: 'Use strengths to capitalize on opportunities' },
    { key: 'st', cls: 'st', label: 'ST — Protect',  sub: 'Use strengths to mitigate threats' },
    { key: 'wo', cls: 'wo', label: 'WO — Improve',  sub: 'Overcome weaknesses by exploiting opportunities' },
    { key: 'wt', cls: 'wt', label: 'WT — Defend',   sub: 'Minimize weaknesses, avoid compounding threats' },
];

/* ── Item Modal ───────────────────────────────────────────── */

function ItemModal({ item, quadrant, onSave, onClose, saving }) {
    const [label,    setLabel]    = useState(item?.label       || '');
    const [desc,     setDesc]     = useState(item?.description || '');
    const [priority, setPriority] = useState(item?.priority    || 'medium');
    const qName = QUADRANTS.find(q => q.key === quadrant)?.label;
    return (
        <div className="sw-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
            <div className="sw-modal">
                <div className="sw-modal-title">{item?.id ? 'Edit Item' : `Add to ${qName}`}</div>
                <div className="sw-form-group">
                    <label className="sw-label">Label *</label>
                    <input className="sw-input" value={label} onChange={e => setLabel(e.target.value)}
                        placeholder="Short descriptive title" autoFocus />
                </div>
                <div className="sw-form-group">
                    <label className="sw-label">Description</label>
                    <textarea className="sw-textarea" value={desc} onChange={e => setDesc(e.target.value)}
                        placeholder="Supporting detail, context, or evidence..." />
                </div>
                <div className="sw-form-group">
                    <label className="sw-label" style={{marginBottom:'8px'}}>Priority</label>
                    <div className="sw-pri-row">
                        {PRIORITIES.map(p => (
                            <button key={p}
                                className={`sw-pri-opt${priority === p ? ' active ' + p : ''}`}
                                onClick={() => setPriority(p)}
                            >
                                {p.charAt(0).toUpperCase() + p.slice(1)}
                            </button>
                        ))}
                    </div>
                </div>
                <div className="sw-modal-actions">
                    <button className="sw-btn-ghost" onClick={onClose}>Cancel</button>
                    <button className="sw-btn-primary"
                        disabled={!label.trim() || saving}
                        onClick={() => onSave({ label: label.trim(), description: desc.trim(), priority, quadrant })}
                    >
                        {saving ? 'Saving...' : item?.id ? 'Save Changes' : 'Add Item'}
                    </button>
                </div>
            </div>
        </div>
    );
}

/* ── SwotItem ─────────────────────────────────────────────── */

function SwotItem({ item, canEdit, onEdit, onDelete }) {
    return (
        <div className="sw-item">
            <div className="sw-item-top">
                <div className="sw-item-label">{item.label}</div>
                <div className="sw-item-right">
                    <span className={`sw-pri ${item.priority}`}>{item.priority}</span>
                    {canEdit && (
                        <>
                            <button className="sw-icon-btn" title="Edit" onClick={() => onEdit(item)}>✎</button>
                            <button className="sw-icon-btn del" title="Delete" onClick={() => onDelete(item.id)}>✕</button>
                        </>
                    )}
                </div>
            </div>
            {item.description && <div className="sw-item-desc">{item.description}</div>}
        </div>
    );
}

/* ── SwotQuadrant ─────────────────────────────────────────── */

function SwotQuadrant({ q, items, canEdit, onAdd, onEdit, onDelete }) {
    return (
        <div className={`sw-quad ${q.key}`}>
            <div className="sw-quad-head">
                <div className="sw-letter">{q.key.toUpperCase()}</div>
                <div className="sw-quad-info">
                    <div className="sw-quad-name">{q.label}</div>
                    <div className="sw-quad-sub">{q.sub}</div>
                </div>
                <div className="sw-count">{items.length}</div>
            </div>
            <div className="sw-items">
                {items.map(item => (
                    <SwotItem key={item.id} item={item} canEdit={canEdit}
                        onEdit={onEdit} onDelete={onDelete} />
                ))}
                {canEdit && (
                    <button className="sw-add-btn" onClick={() => onAdd(q.key)}>+ Add item</button>
                )}
            </div>
        </div>
    );
}

/* ── Strategy Layer ───────────────────────────────────────── */

function StrategyLayer({ strategy, canEdit, onUpdate }) {
    const [open,    setOpen]    = useState(false);
    const [editing, setEditing] = useState(null);
    const [draft,   setDraft]   = useState('');
    const [saving,  setSaving]  = useState(false);

    const save = async key => {
        setSaving(true);
        await onUpdate(key, draft);
        setSaving(false);
        setEditing(null);
    };

    return (
        <div className="sw-strategy">
            <button className="sw-strategy-btn" onClick={() => setOpen(o => !o)}>
                <div>
                    <div className="sw-strategy-eyebrow">Strategic Implications</div>
                    <div className="sw-strategy-title">What do we do with this?</div>
                </div>
                <svg style={{color:'#475569', flexShrink:0, transition:'transform 0.3s',
                    transform: open ? 'rotate(180deg)' : 'rotate(0deg)'}}
                    width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" strokeWidth="2">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div className={`sw-strategy-body${open ? ' open' : ''}`}>
                <div className="sw-strategy-inner">
                    <div style={{fontSize:'13px', color:'#475569', marginTop:'16px'}}>
                        Four strategy pairs connecting SWOT findings into action.
                        {canEdit && <span style={{color:'#334155'}}> Click any card to add notes.</span>}
                    </div>
                    <div className="sw-strategy-grid">
                        {STRATEGY_CARDS.map(card => {
                            const notes = strategy[card.key] || '';
                            const isEditing = editing === card.key;
                            return (
                                <div key={card.key} className={`sw-strat-card ${card.cls}`}>
                                    <div className="sw-strat-card-lbl">{card.label}</div>
                                    <div className="sw-strat-card-sub">{card.sub}</div>
                                    {isEditing ? (
                                        <>
                                            <textarea className="sw-textarea"
                                                value={draft}
                                                onChange={e => setDraft(e.target.value)}
                                                placeholder="Key strategic actions and priorities..."
                                                style={{minHeight:'90px', marginBottom:'8px'}}
                                                autoFocus
                                            />
                                            <div style={{display:'flex', gap:'8px'}}>
                                                <button className="sw-btn-primary"
                                                    style={{fontSize:'12px', padding:'6px 14px'}}
                                                    disabled={saving}
                                                    onClick={() => save(card.key)}
                                                >
                                                    {saving ? 'Saving...' : 'Save'}
                                                </button>
                                                <button className="sw-btn-ghost"
                                                    style={{fontSize:'12px', padding:'6px 12px'}}
                                                    onClick={() => setEditing(null)}
                                                >Cancel</button>
                                            </div>
                                        </>
                                    ) : (
                                        <div
                                            onClick={() => { if (canEdit) { setEditing(card.key); setDraft(notes); } }}
                                            style={{
                                                fontSize:'13px', lineHeight:'1.65',
                                                color: notes ? '#94a3b8' : '#334155',
                                                fontStyle: notes ? 'normal' : 'italic',
                                                minHeight:'40px',
                                                cursor: canEdit ? 'pointer' : 'default',
                                            }}
                                        >
                                            {notes || (canEdit ? 'Click to add notes...' : 'No notes yet.')}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        </div>
    );
}

/* ── App ──────────────────────────────────────────────────── */

function App({ canEdit }) {
    const [items,    setItems]    = useState([]);
    const [strategy, setStrategy] = useState({});
    const [loading,  setLoading]  = useState(true);
    const [modal,    setModal]    = useState(null);
    const [saving,   setSaving]   = useState(false);

    useEffect(() => {
        Promise.all([
            _npSupabase.from('swot_items').select('*').eq('is_active', true)
                .order('sort_order').order('created_at'),
            _npSupabase.from('swot_strategy').select('*'),
        ]).then(([{ data: itemData }, { data: stratData }]) => {
            setItems(itemData || []);
            const s = {};
            (stratData || []).forEach(r => { s[r.id] = r.notes || ''; });
            setStrategy(s);
            setLoading(false);
        });
    }, []);

    const saveItem = async ({ label, description, priority, quadrant }) => {
        setSaving(true);
        if (modal.item?.id) {
            const { data, error } = await _npSupabase
                .from('swot_items')
                .update({ label, description, priority, updated_at: new Date().toISOString() })
                .eq('id', modal.item.id)
                .select().single();
            if (!error) setItems(prev => prev.map(i => i.id === data.id ? data : i));
        } else {
            const { data, error } = await _npSupabase
                .from('swot_items')
                .insert([{ label, description, priority, quadrant,
                    sort_order: items.filter(i => i.quadrant === quadrant).length }])
                .select().single();
            if (!error) setItems(prev => [...prev, data]);
        }
        setSaving(false);
        setModal(null);
    };

    const deleteItem = async id => {
        if (!confirm('Remove this item from the SWOT?')) return;
        await _npSupabase.from('swot_items').update({ is_active: false }).eq('id', id);
        setItems(prev => prev.filter(i => i.id !== id));
    };

    const updateStrategy = async (key, notes) => {
        await _npSupabase.from('swot_strategy')
            .upsert({ id: key, notes, updated_at: new Date().toISOString() });
        setStrategy(prev => ({ ...prev, [key]: notes }));
    };

    if (loading) return <div className="sw-loading">Loading...</div>;

    return (
        <div className="swot-wrap">
            <div className="sw-hero">
                <div className="sw-eyebrow">NACS IT Department · Confidential · FY2026</div>
                <div className="sw-title">SWOT Analysis</div>
                <div className="sw-subtitle">
                    An internal assessment of the IT department's strategic position — identifying what we do well, where we fall short, and how to shape what comes next.
                </div>
                <div className="sw-tags">
                    <span className="sw-tag">Internal team knowledge</span>
                    <span className="sw-tag">Facility administrator feedback</span>
                    <span className="sw-tag">Ticketing trends</span>
                    <span className="sw-tag">Market benchmarking</span>
                    <span className="sw-tag">Feb 2026</span>
                </div>
            </div>

            <div className="sw-axis-row">
                <div className="sw-axis-label">Internal</div>
                <div className="sw-axis-label">Internal</div>
            </div>
            <div className="sw-axis-sep"></div>

            <div className="sw-grid">
                {QUADRANTS.map(q => (
                    <SwotQuadrant key={q.key} q={q}
                        items={items.filter(i => i.quadrant === q.key)}
                        canEdit={canEdit}
                        onAdd={key => setModal({ quadrant: key })}
                        onEdit={item => setModal({ quadrant: item.quadrant, item })}
                        onDelete={deleteItem}
                    />
                ))}
            </div>

            <StrategyLayer strategy={strategy} canEdit={canEdit} onUpdate={updateStrategy} />

            {modal && (
                <ItemModal
                    item={modal.item}
                    quadrant={modal.quadrant}
                    onSave={saveItem}
                    onClose={() => setModal(null)}
                    saving={saving}
                />
            )}
        </div>
    );
}

/* ── Mount ────────────────────────────────────────────────── */

(async () => {
    const { data: { session } } = await _npSupabase.auth.getSession();
    if (!session) { window.location.href = '/login.html'; return; }
    _npUser = session.user;
    const { data: roleData } = await _npSupabase
        .from('user_roles').select('role').eq('user_id', session.user.id).single();
    _npRole = roleData?.role || 'staff';
    npPopulateTopbar();
    renderNav('swot');
    const canEdit = ['exec', 'admin'].includes(_npRole);
    ReactDOM.createRoot(document.getElementById('app-root')).render(<App canEdit={canEdit} />);
})();
</script>
</body>
</html>
